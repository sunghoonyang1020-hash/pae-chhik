<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>패찍이 · 공부 계획</title>
<meta name="theme-color" content="#1c1917" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  html, body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent;
    background: #fafaf9;
  }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.5s ease-out; }
</style>
</head>
<body>

<div id="root"></div>

<!-- ============================================
     Supabase 설정 - 여기 두 줄만 수정하면 돼!
     ============================================ -->
<script>
  window.SUPABASE_URL = "여기에_SUPABASE_URL_붙여넣기";
  window.SUPABASE_ANON_KEY = "여기에_ANON_KEY_붙여넣기";
</script>

<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo } = React;

// ========== Supabase 연결 ==========
const HAS_SUPABASE = window.SUPABASE_URL 
  && window.SUPABASE_URL.startsWith('https://')
  && window.SUPABASE_ANON_KEY 
  && window.SUPABASE_ANON_KEY.length > 50;

const sb = HAS_SUPABASE ? supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

// 전역 로그 버퍼 (화면에 표시할 수 있게)
window.__LOGS = [];
const logBoth = (...args) => {
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  window.__LOGS.push({ t: new Date().toLocaleTimeString(), msg });
  if (window.__LOGS.length > 50) window.__LOGS.shift();
  console.log(...args);
  if (window.__rerenderDebug) window.__rerenderDebug();
};

logBoth('[패찍이] HAS_SUPABASE:', HAS_SUPABASE);
logBoth('[패찍이] URL:', window.SUPABASE_URL?.slice(0, 30) + '...');
logBoth('[패찍이] KEY length:', window.SUPABASE_ANON_KEY?.length);

// ========== 기본 데이터 ==========
const DEFAULT_CONFIG = { examName:'6월 모의고사', startDate:'2026-04-19', endDate:'2026-06-03', holidays:['2026-05-04','2026-05-05'] };
const DEFAULT_COURSES = [
  { id:'c-me3bi', name:'매3비', subject:'국어', type:'lesson', totalLessons:30, doneLessons:7, unit:'강', targetDate:'2026-06-02', days:[1,2,3,4], postCompleteText:'기출 1회', sortOrder:1 },
  { id:'c-me3mun', name:'매3문', subject:'국어', type:'lesson', totalLessons:30, doneLessons:7, unit:'강', targetDate:'2026-05-29', days:[2,3,4,5], postCompleteText:'기출 1회', sortOrder:2 },
  { id:'c-samun', name:'사문', subject:'사문', type:'lesson', totalLessons:16, doneLessons:3, unit:'강', targetDate:'2026-05-22', days:[2,3,4], postCompleteText:'기출 1회', sortOrder:3 },
  { id:'c-youdok', name:'하루6개 1등급영독', subject:'영어', type:'lesson', totalLessons:25, doneLessons:2, unit:'일차', targetDate:'2026-05-22', days:[1,2,3,4,5], postCompleteText:'약점유형 1세트', sortOrder:4 },
  { id:'c-grammar', name:'문법', subject:'문법', type:'lesson', totalLessons:98, doneLessons:12, unit:'강', targetDate:'2026-09-03', days:[2,3,4], note:'9모까지 완주 목표', sortOrder:5 },
  { id:'c-prob', name:'확통', subject:'확통', type:'quota', dailyAmount:15, unit:'문제', days:[1,2,3,4,5], note:'자이스토리 · 남은 422개 완주', sortOrder:6 },
  { id:'c-math1', name:'수1', subject:'수1', type:'quota', dailyAmount:20, unit:'문제', days:[1,2,3,4,5], note:'자이스토리 · 감 유지', sortOrder:7 },
  { id:'c-math2', name:'수2', subject:'수2', type:'quota', dailyAmount:15, unit:'문제', days:[1,2,3,4,5], note:'자이스토리 · 감 유지', sortOrder:8 },
  { id:'c-word-mw', name:'영단어 (월·수)', subject:'영단어', type:'quota', dailyAmount:100, unit:'개', days:[1,3], note:'자투리 시간 활용', sortOrder:9 },
  { id:'c-word-tf', name:'영단어 (화·목·금)', subject:'영단어', type:'quota', dailyAmount:80, unit:'개', days:[2,4,5], note:'자투리 시간 활용', sortOrder:10 },
  { id:'c-hakwon', name:'학원', subject:'학원', type:'quota', dailyAmount:2, unit:'h', days:[1,5], nonCarryable:true, note:'정보성 표시 (이월 X)', sortOrder:11 },
];

// ========== DB ↔ JS 변환 ==========
const fromDb = (r) => ({ id:r.id, name:r.name, subject:r.subject, type:r.type, totalLessons:r.total_lessons, doneLessons:r.done_lessons, dailyAmount:r.daily_amount, unit:r.unit||'개', targetDate:r.target_date, days:r.days||[], postCompleteText:r.post_complete_text, note:r.note, nonCarryable:r.non_carryable, sortOrder:r.sort_order });
const toDb = (c) => ({ name:c.name, subject:c.subject, type:c.type, total_lessons:c.totalLessons??null, done_lessons:c.doneLessons??0, daily_amount:c.dailyAmount??null, unit:c.unit, target_date:c.targetDate??null, days:c.days, post_complete_text:c.postCompleteText??null, note:c.note??null, non_carryable:c.nonCarryable??false, sort_order:c.sortOrder??0 });

// ========== 날짜 ==========
const pd = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const fd = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addD = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const dow = (ds) => pd(ds).getDay();
const dowN = (ds) => ['일','월','화','수','목','금','토'][dow(ds)];
const daysBtw = (f, t) => { const o=[]; let c=pd(f); const e=pd(t); while(c<=e){o.push(fd(c)); c=addD(c,1);} return o; };

// ========== UUID 검증 ==========
const isUUID = (s) => typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);

// ========== 과목 색 ==========
const SUBJECTS = {
  국어:{bg:'bg-rose-50',bd:'border-rose-200',ch:'bg-rose-100 text-rose-800'},
  영어:{bg:'bg-sky-50',bd:'border-sky-200',ch:'bg-sky-100 text-sky-800'},
  사문:{bg:'bg-emerald-50',bd:'border-emerald-200',ch:'bg-emerald-100 text-emerald-800'},
  확통:{bg:'bg-fuchsia-50',bd:'border-fuchsia-200',ch:'bg-fuchsia-100 text-fuchsia-800'},
  수1:{bg:'bg-indigo-50',bd:'border-indigo-200',ch:'bg-indigo-100 text-indigo-800'},
  수2:{bg:'bg-violet-50',bd:'border-violet-200',ch:'bg-violet-100 text-violet-800'},
  문법:{bg:'bg-amber-50',bd:'border-amber-200',ch:'bg-amber-100 text-amber-800'},
  영단어:{bg:'bg-cyan-50',bd:'border-cyan-200',ch:'bg-cyan-100 text-cyan-800'},
  학원:{bg:'bg-orange-50',bd:'border-orange-200',ch:'bg-orange-100 text-orange-800'},
  기타:{bg:'bg-stone-50',bd:'border-stone-200',ch:'bg-stone-100 text-stone-700'},
};
const getSub = (s) => SUBJECTS[s] || SUBJECTS.기타;

// ========== 스케줄 ==========
function buildSchedule(courses, holidays, config) {
  const s = {};
  const all = daysBtw(config.startDate, config.endDate);
  for (const ds of all) {
    s[ds] = { wd:dowN(ds), tasks:[], isHoliday:holidays.includes(ds), special: holidays.includes(ds) ? '🏖️ 휴일' : null };
  }
  const sorted = [...courses].sort((a,b) => (a.sortOrder??99)-(b.sortOrder??99));
  for (const c of sorted) {
    let p = c.doneLessons || 0;
    for (const ds of all) {
      if (s[ds].isHoliday) continue;
      if (!c.days.includes(dow(ds))) continue;
      let text, target;
      if (c.type === 'lesson') {
        p++; target = 1;
        if (p <= (c.totalLessons||0)) text = `${c.name} ${p}${c.unit}`;
        else if (c.postCompleteText) text = `${c.name} · ${c.postCompleteText}`;
        else continue;
      } else {
        target = c.dailyAmount || 1;
        text = c.name;
      }
      s[ds].tasks.push({ id:`${c.id}:${ds}`, courseId:c.id, subject:c.subject, text, target, type:c.type });
    }
  }
  return s;
}

// ========== 메인 앱 ==========
function App() {
  const [courses, setCourses] = useState([]);
  const [checked, setChecked] = useState({});
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [status, setStatus] = useState('초기화 중...');
  const [showDebug, setShowDebug] = useState(false);
  const [logTick, setLogTick] = useState(0);

  // 로그 리렌더 트리거
  useEffect(() => {
    window.__rerenderDebug = () => setLogTick(t => t + 1);
  }, []);

  // 초기 로드 (순차적으로)
  useEffect(() => {
    if (!sb) {
      setStatus('⚠️ Supabase 없음 - 로컬 모드');
      setCourses(DEFAULT_COURSES);
      return;
    }
    (async () => {
      try {
        setStatus('courses 로딩...');
        const cR = await sb.from('courses').select('*').order('sort_order');
        if (cR.error) throw new Error('courses: ' + cR.error.message);
        
        let coursesFromDb;
        if (cR.data && cR.data.length > 0) {
          coursesFromDb = cR.data.map(fromDb);
          logBoth('DB에서 강좌 로드:', coursesFromDb.length, '개');
          logBoth('첫 번째 id:', coursesFromDb[0]?.id);
          logBoth('UUID?:', isUUID(coursesFromDb[0]?.id));
        } else {
          setStatus('강좌 없음 - 기본값 업로드 중...');
          const { data, error } = await sb.from('courses').insert(DEFAULT_COURSES.map(toDb)).select();
          if (error) throw new Error('insert: ' + error.message);
          coursesFromDb = data.map(fromDb);
          logBoth('기본 강좌 업로드:', coursesFromDb.length);
        }
        
        setStatus('config 로딩...');
        const cfR = await sb.from('user_config').select('*').eq('id', 1).maybeSingle();
        if (cfR.error) throw new Error('config: ' + cfR.error.message);
        if (cfR.data) {
          setConfig({
            examName: cfR.data.exam_name,
            startDate: cfR.data.start_date,
            endDate: cfR.data.end_date,
            holidays: cfR.data.holidays || [],
          });
        }
        
        setStatus('checks 로딩...');
        const chR = await sb.from('task_checks').select('*');
        if (chR.error) throw new Error('checks: ' + chR.error.message);
        
        setCourses(coursesFromDb);
        
        if (chR.data) {
          const m = {};
          for (const r of chR.data) m[`${r.course_id}:${r.task_date}`] = r.achieved;
          setChecked(m);
          logBoth('체크 로드:', Object.keys(m).length, '개');
        }
        
        setStatus('✅ 준비 완료');
      } catch (e) {
        logBoth('❌ 오류:', e.message);
        setStatus('❌ 오류: ' + e.message);
      }
    })();
  }, []);

  const toggleCheck = async (task) => {
    const cur = checked[task.id] || 0;
    const [cid, td] = task.id.split(':');
    const newVal = cur >= task.target ? 0 : task.target;
    
    logBoth(`[CLICK] cid=${cid?.slice(0,8)}... td=${td} cur=${cur} new=${newVal}`);
    logBoth(`[CLICK] UUID valid?`, isUUID(cid));
    
    // 낙관적 업데이트
    setChecked({ ...checked, [task.id]: newVal });
    
    if (!sb) {
      logBoth('[CLICK] Supabase 없음, 로컬만');
      return;
    }
    
    if (!isUUID(cid)) {
      logBoth('[CLICK] ❌ course_id가 UUID 아님!');
      alert('course_id가 UUID 형식 아님: ' + cid);
      return;
    }
    
    try {
      let result;
      if (newVal <= 0) {
        logBoth('[DB] DELETE 시도');
        result = await sb.from('task_checks').delete().eq('course_id', cid).eq('task_date', td);
      } else {
        logBoth('[DB] UPSERT 시도');
        result = await sb.from('task_checks').upsert({
          course_id: cid,
          task_date: td,
          achieved: newVal,
          updated_at: new Date().toISOString(),
        });
      }
      
      if (result.error) {
        logBoth('[DB] ❌ 실패:', result.error.message);
        alert('DB 저장 실패: ' + result.error.message);
      } else {
        logBoth('[DB] ✅ 성공');
      }
    } catch (e) {
      logBoth('[DB] ❌ 예외:', e.message);
      alert('DB 예외: ' + e.message);
    }
  };

  const schedule = useMemo(() => buildSchedule(courses, config.holidays, config), [courses, config]);
  const today = fd(new Date()) >= config.startDate ? (fd(new Date()) <= config.endDate ? fd(new Date()) : config.endDate) : config.startDate;
  const allDates = Object.keys(schedule).sort();
  const weekStart = (() => { const d = pd(today); d.setDate(d.getDate() - d.getDay()); return d; })();
  const weekDays = Array.from({length:7}, (_,i) => fd(addD(weekStart, i)));

  return (
    <div className="min-h-screen bg-stone-50 text-stone-800 pb-20">
      {/* 상단 상태바 */}
      <div className="bg-stone-900 text-white p-3 sticky top-0 z-10">
        <div className="text-xs text-stone-400">패찍이 · 디버그 모드</div>
        <div className="text-sm font-bold">{status}</div>
        <div className="mt-1 text-[11px] text-stone-400">
          Supabase: {HAS_SUPABASE ? '✅' : '❌'} · 강좌: {courses.length} · 체크: {Object.keys(checked).length}
        </div>
        <button onClick={() => setShowDebug(!showDebug)} className="mt-2 text-[10px] bg-stone-700 px-2 py-1 rounded">
          {showDebug ? '디버그 닫기' : '디버그 로그 보기'}
        </button>
      </div>
      
      {/* 디버그 패널 */}
      {showDebug && (
        <div className="bg-stone-100 border-b border-stone-300 max-h-64 overflow-y-auto p-2 text-[10px] font-mono">
          {window.__LOGS.slice(-30).reverse().map((log, i) => (
            <div key={i} className="mb-0.5">
              <span className="text-stone-500">{log.t}</span> {log.msg}
            </div>
          ))}
        </div>
      )}

      {/* 캘린더 */}
      <div className="p-3 space-y-3">
        <div className="text-sm font-bold text-stone-700">이번 주 할 일</div>
        {weekDays.map(ds => {
          const day = schedule[ds];
          if (!day) return null;
          const isToday = ds === today;
          return (
            <div key={ds} className={`bg-white border rounded-xl overflow-hidden ${isToday ? 'border-rose-400 ring-2 ring-rose-200' : 'border-stone-200'}`}>
              <div className={`px-3 py-2 text-xs font-bold ${isToday ? 'bg-rose-500 text-white' : 'bg-stone-50'}`}>
                {ds.slice(5)} ({day.wd}) {isToday && '· TODAY'} {day.special}
              </div>
              <div className="p-2 space-y-1">
                {day.tasks.length === 0 && <div className="text-xs text-stone-400 text-center py-2">할 일 없음</div>}
                {day.tasks.map(t => {
                  const val = checked[t.id] || 0;
                  const done = val >= t.target;
                  const cfg = getSub(t.subject);
                  return (
                    <button key={t.id} onClick={() => toggleCheck(t)}
                      className={`w-full flex items-center gap-2 p-2 rounded-lg border ${done ? 'bg-stone-100 border-stone-200' : `${cfg.bg} ${cfg.bd}`}`}>
                      <div className={`flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center ${done ? 'bg-emerald-500 border-emerald-500' : 'bg-white border-stone-400'}`}>
                        {done && <span className="text-white text-xs">✓</span>}
                      </div>
                      <span className={`text-[10px] px-1.5 py-0.5 rounded ${cfg.ch}`}>{t.subject}</span>
                      <span className={`text-sm text-left flex-1 ${done ? 'line-through text-stone-400' : ''}`}>
                        {t.text}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
