// ========== 과목 팔레트 ==========
const SUBJECTS = {

  영단어:{c:'text-cyan-700',bg:'bg-cyan-50',bd:'border-cyan-200',ch:'bg-cyan-100 text-cyan-800',br:'bg-cyan-500'},
  학원:{c:'text-orange-700',bg:'bg-orange-50',bd:'border-orange-200',ch:'bg-orange-100 text-orange-800',br:'bg-orange-500'},
  한국사:{c:'text-purple-700',bg:'bg-purple-50',bd:'border-purple-200',ch:'bg-purple-100 text-purple-800',br:'bg-purple-500'},
  기타:{c:'text-stone-600',bg:'bg-stone-50',bd:'border-stone-200',ch:'bg-stone-100 text-stone-700',br:'bg-stone-500'},
};
const SUB_LIST = Object.keys(SUBJECTS);
const getSub = (s) => SUBJECTS[s] || SUBJECTS.기타;

// ========== 날짜 헬퍼 ==========
const pd = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const fd = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addD = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const weekDates = (a) => { const s = new Date(pd(a)); s.setDate(s.getDate()-s.getDay()); return Array.from({length:7},(_,i)=>fd(addD(s,i))); };
const dow = (ds) => pd(ds).getDay();
const dowN = (ds) => ['일','월','화','수','목','금','토'][dow(ds)];
const dDay = (f, t) => Math.ceil((pd(t) - pd(f)) / 86400000);
const daysBtw = (f, t) => { const o=[]; let c=pd(f); const e=pd(t); while(c<=e){o.push(fd(c)); c=addD(c,1);} return o; };

// ========== 기본 데이터 ==========
const DEFAULT_CONFIG = { examName:'6월 모의고사', startDate:'2026-04-19', endDate:'2026-06-03', holidays:['2026-05-04','2026-05-05'] };
const DEFAULT_COURSES = [
  { id:'c-me3bi', name:'매3비', subject:'국어', type:'lesson', totalLessons:30, doneLessons:7, unit:'강', targetDate:'2026-06-02', days:[1,2,3,4], postCompleteText:'기출 1회', sortOrder:1 },
  { id:'c-me3mun', name:'매3문', subject:'국어', type:'lesson', totalLessons:30, doneLessons:7, unit:'강', targetDate:'2026-05-29', days:[2,3,4,5], postCompleteText:'기출 1회', sortOrder:2 },
  { id:'c-samun', name:'사문', subject:'사문', type:'lesson', totalLessons:16, doneLessons:3, unit:'강', targetDate:'2026-05-22', days:[2,3,4], postCompleteText:'기출 1회', sortOrder:3 },
  { id:'c-youdok', name:'하루6개 1등급영독', subject:'영어', type:'lesson', totalLessons:25, doneLessons:2, unit:'일차', targetDate:'2026-05-22', days:[1,2,3,4,5], postCompleteText:'약점유형 1세트', sortOrder:4 },
  { id:'c-grammar', name:'문법', subject:'문법', type:'lesson', totalLessons:98, doneLessons:12, unit:'강', targetDate:'2026-09-03', days:[2,3,4], note:'9모까지 완주 목표', sortOrder:5 },
  { id:'c-prob', name:'확통', subject:'확통', type:'quota', dailyAmount:15, unit:'문제', days:[1,2,3,4,5], note:'자이스토리 · 남은 422개 완주', sortOrder:6 },
  { id:'c-math1', name:'수1', subject:'수1', type:'quota', dailyAmount:20, unit:'문제', days:[1,2,3,4,5], note:'자이스토리 · 감 유지', sortOrder:7 },
  { id:'c-math2', name:'수2', subject:'수2', type:'quota', dailyAmount:15, unit:'문제', days:[1,2,3,4,5], note:'자이스토리 · 감 유지', sortOrder:8 },
  { id:'c-word-mw', name:'영단어 (월·수)', subject:'영단어', type:'quota', dailyAmount:100, unit:'개', days:[1,3], note:'자투리 시간 활용', sortOrder:9 },
  { id:'c-word-tf', name:'영단어 (화·목·금)', subject:'영단어', type:'quota', dailyAmount:80, unit:'개', days:[2,4,5], note:'자투리 시간 활용', sortOrder:10 },
  { id:'c-hakwon', name:'학원', subject:'학원', type:'quota', dailyAmount:2, unit:'h', days:[1,5], nonCarryable:true, note:'정보성 표시 (이월 X)', sortOrder:11 },
];

// ========== DB ↔ JS 변환 ==========
const fromDb = (r) => ({ id:r.id, name:r.name, subject:r.subject, type:r.type, totalLessons:r.total_lessons, doneLessons:r.done_lessons, dailyAmount:r.daily_amount, unit:r.unit||'개', targetDate:r.target_date, days:r.days||[], postCompleteText:r.post_complete_text, note:r.note, nonCarryable:r.non_carryable, sortOrder:r.sort_order });
const toDb = (c) => ({ name:c.name, subject:c.subject, type:c.type, total_lessons:c.totalLessons??null, done_lessons:c.doneLessons??0, daily_amount:c.dailyAmount??null, unit:c.unit, target_date:c.targetDate??null, days:c.days, post_complete_text:c.postCompleteText??null, note:c.note??null, non_carryable:c.nonCarryable??false, sort_order:c.sortOrder??0 });

// ========== localStorage 백업 ==========
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem('pc:'+k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem('pc:'+k, JSON.stringify(v)); } catch {} },
};

// ========== 스케줄 빌더 ==========
function buildSchedule(courses, holidays, config) {
  const s = {};
  const all = daysBtw(config.startDate, config.endDate);
  for (const ds of all) {
    const isH = holidays.includes(ds);
    s[ds] = { wd:dowN(ds), special: isH?'🏖️ 휴일 · 전면 휴식':null, tasks:[], isHoliday:isH };
  }
  const sorted = [...courses].sort((a,b) => (a.sortOrder??99)-(b.sortOrder??99));
  for (const c of sorted) {
    let p = c.doneLessons || 0;
    for (const ds of all) {
      if (s[ds].isHoliday) continue;
      if (!c.days.includes(dow(ds))) continue;
      const tid = `${c.id}:${ds}`;
      let text, target;
      if (c.type === 'lesson') {
        p++; target = 1;
        if (p <= (c.totalLessons||0)) text = `${c.name} ${p}${c.unit}`;
        else if (c.postCompleteText) text = `${c.name} · ${c.postCompleteText}`;
        else continue;
      } else {
        target = c.dailyAmount || 1;
        text = c.name;
      }
      s[ds].tasks.push({ id:tid, courseId:c.id, subject:c.subject, text, note:c.note, unit:c.unit, target, type:c.type, carryable:!c.nonCarryable });
    }
  }
  const first = config.startDate;
  if (s[first]) {
    for (const c of sorted) {
      if (c.type !== 'lesson' || !c.doneLessons || c.doneLessons <= 0) continue;
      if (s[first].tasks.some(t => t.courseId === c.id)) continue;
      s[first].tasks.unshift({ id:`${c.id}:today-init`, courseId:c.id, subject:c.subject, text:`${c.name} ${c.doneLessons}${c.unit} (오늘 분량)`, note:'첫날 — 현재 진도', target:1, type:'lesson', carryable:!c.nonCarryable, unit:c.unit });
    }
    if (s[first].tasks.length > 0 && !s[first].special) s[first].special = '🎯 오늘 반드시';
  }
  if (s[config.endDate]) {
    s[config.endDate].special = `🚀 ${config.examName} D-DAY`;
    s[config.endDate].isExam = true;
    s[config.endDate].tasks = [{ id:'exam:day', courseId:'exam', subject:'기타', text:config.examName+' — 조져버리자', target:1, type:'lesson', carryable:false, unit:'' }];
  }
  return s;
}

function cStats(c, holidays, cfg, today) {
  const tgt = c.targetDate || cfg.endDate;
  const from = pd(today) > pd(cfg.startDate) ? today : cfg.startDate;
  const all = daysBtw(from, tgt);
  let sd = 0;
  for (const ds of all) { if (holidays.includes(ds)) continue; if (c.days.includes(dow(ds))) sd++; }
  if (c.type === 'lesson') {
    const rem = Math.max(0, (c.totalLessons||0) - (c.doneLessons||0));
    const pace = sd > 0 ? rem/sd : 0;
    return { studyDays:sd, remaining:rem, pace, feasible:sd >= rem };
  }
  return { studyDays:sd, total:sd * (c.dailyAmount||0) };
}

// ========== 메인 앱 ==========
function App() {
  const [courses, setCourses] = useState(() => LS.get('courses', DEFAULT_COURSES));
  const [checked, setChecked] = useState(() => LS.get('checked', {}));
  const [config, setConfig] = useState(() => LS.get('config', DEFAULT_CONFIG));
  const [today, setToday] = useState(() => {
    const real = fd(new Date());
    const cfg = LS.get('config', DEFAULT_CONFIG);
    return (real >= cfg.startDate && real <= cfg.endDate) ? real : cfg.startDate;
  });
  const [anchor, setAnchor] = useState(today);
  const [view, setView] = useState('calendar');
  const [editing, setEditing] = useState(null);
  const [quickEdit, setQuickEdit] = useState(null);
  const [justChecked, setJustChecked] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | err

  // 초기 로드: Supabase 있으면 덮어쓰기
  useEffect(() => {
    if (!sb) return;
    (async () => {
      setSyncStatus('syncing');
      try {
        const [cR, chR, cfR] = await Promise.all([
          sb.from('courses').select('*').order('sort_order'),
          sb.from('task_checks').select('*'),
          sb.from('user_config').select('*').eq('id',1).maybeSingle(),
        ]);
        if (cR.data && cR.data.length > 0) {
          const cs = cR.data.map(fromDb);
          setCourses(cs);
          LS.set('courses', cs);
        }
        if (chR.data) {
          const m = {};
          for (const r of chR.data) m[`${r.course_id}:${r.task_date}`] = r.achieved;
          setChecked(m);
          LS.set('checked', m);
        }
        if (cfR.data) {
          const cfg = { examName:cfR.data.exam_name, startDate:cfR.data.start_date, endDate:cfR.data.end_date, holidays:cfR.data.holidays||[] };
          setConfig(cfg);
          LS.set('config', cfg);
        }
        setSyncStatus('ok');
      } catch (e) {
        console.warn('동기화 실패, 로컬 사용:', e);
        setSyncStatus('err');
      }
    })();
  }, []);

  // ===== 체크 =====
  const saveCheckDb = async (cid, td, v) => {
    if (!sb || cid === 'exam' || td === 'today-init') return;
    try {
      if (v <= 0) await sb.from('task_checks').delete().eq('course_id',cid).eq('task_date',td);
      else await sb.from('task_checks').upsert({ course_id:cid, task_date:td, achieved:v, updated_at:new Date().toISOString() });
    } catch (e) { console.warn(e); }
  };
  const updChecked = (next) => { setChecked(next); LS.set('checked', next); };

  const toggleFull = (t) => {
    const cur = checked[t.id] || 0;
    const [cid, td] = t.id.split(':');
    if (cid === 'exam') return;
    const nv = cur >= t.target ? 0 : t.target;
    updChecked({ ...checked, [t.id]: nv });
    saveCheckDb(cid, td, nv);
    if (cur < t.target) { setJustChecked(t.id); setTimeout(() => setJustChecked(null), 600); }
  };
  const adjust = (t, d) => {
    const cur = checked[t.id] || 0;
    const [cid, td] = t.id.split(':');
    if (cid === 'exam') return;
    const v = Math.max(0, cur + d);
    updChecked({ ...checked, [t.id]: v });
    saveCheckDb(cid, td, v);
  };
  const setVal = (tid, v) => {
    const [cid, td] = tid.split(':');
    const val = Math.max(0, v);
    updChecked({ ...checked, [tid]: val });
    saveCheckDb(cid, td, val);
  };
  const resetAll = async () => {
    if (!confirm('체크 기록 전부 초기화할거야?')) return;
    updChecked({});
    if (sb) { try { await sb.from('task_checks').delete().not('course_id','is',null); } catch(e){} }
  };

  // ===== 강좌 CRUD =====
  const saveCourse = async (form) => {
    try {
      if (form.isNew) {
        const { isNew, id, ...rest } = form;
        let created;
        if (sb) {
          const { data, error } = await sb.from('courses').insert(toDb(rest)).select().single();
          if (error) throw error;
          created = fromDb(data);
        } else {
          created = { ...rest, id: 'local-' + Date.now() };
        }
        const next = [...courses, created];
        setCourses(next); LS.set('courses', next);
      } else {
        let updated = form;
        if (sb) {
          const { data, error } = await sb.from('courses').update(toDb(form)).eq('id', form.id).select().single();
          if (error) throw error;
          updated = fromDb(data);
        }
        const next = courses.map(c => c.id === updated.id ? updated : c);
        setCourses(next); LS.set('courses', next);
      }
      setEditing(null);
    } catch (e) { alert('저장 실패: ' + e.message); }
  };

  const deleteCourse = async (id) => {
    if (!confirm('이 강좌 삭제할거야? 체크 기록도 같이 날아가.')) return;
    if (sb) { try { await sb.from('courses').delete().eq('id', id); } catch(e){} }
    const next = courses.filter(c => c.id !== id);
    setCourses(next); LS.set('courses', next);
    const nc = { ...checked };
    for (const k of Object.keys(nc)) if (k.startsWith(`${id}:`)) delete nc[k];
    updChecked(nc);
  };

  const toggleHoliday = async (ds) => {
    const next = config.holidays.includes(ds) ? config.holidays.filter(h=>h!==ds) : [...config.holidays, ds];
    const nc = { ...config, holidays: next };
    setConfig(nc); LS.set('config', nc);
    if (sb) { try { await sb.from('user_config').update({ holidays: next }).eq('id', 1); } catch(e){} }
  };

  const updateConfig = async (c) => {
    setConfig(c); LS.set('config', c);
    if (sb) { try { await sb.from('user_config').update({ exam_name:c.examName, start_date:c.startDate, end_date:c.endDate, holidays:c.holidays }).eq('id',1); } catch(e){} }
  };

  // ===== 계산 =====
  const schedule = useMemo(() => buildSchedule(courses, config.holidays, config), [courses, config]);
  const allDates = useMemo(() => Object.keys(schedule).sort(), [schedule]);
  const wd = useMemo(() => weekDates(anchor), [anchor]);

  const missed = useMemo(() => {
    const out = [];
    for (const ds of allDates) {
      if (pd(ds) >= pd(today)) break;
      const d = schedule[ds];
      if (!d || d.isHoliday) continue;
      for (const t of d.tasks) {
        if (!t.carryable) continue;
        const v = checked[t.id] || 0;
        if (v < t.target) out.push({ ...t, originalDate: ds });
      }
    }
    return out;
  }, [schedule, checked, today, allDates]);

  const stats = useMemo(() => {
    let total = 0, done = 0;
    const bySub = {};
    for (const ds of allDates) {
      for (const t of schedule[ds].tasks) {
        if (t.courseId === 'exam') continue;
        const v = Math.min(checked[t.id] || 0, t.target);
        total += t.target; done += v;
        if (!bySub[t.subject]) bySub[t.subject] = { total:0, done:0 };
        bySub[t.subject].total += t.target;
        bySub[t.subject].done += v;
      }
    }
    return { total, done, bySub };
  }, [schedule, checked, allDates]);

  const dL = dDay(today, config.endDate);
  const [ws, we] = [wd[0], wd[6]];

  return (
    <div className="min-h-screen bg-stone-50 text-stone-800">
      <header className="bg-gradient-to-br from-stone-900 via-stone-800 to-stone-900 text-stone-100 sticky top-0 z-20 shadow-lg">
        <div className="max-w-3xl mx-auto px-4 py-4">
          <div className="flex items-center justify-between">
            <div>
              <div className="flex items-center gap-2 text-[11px] tracking-widest text-stone-400 uppercase">
                <Target className="w-3 h-3" /><span>{config.examName} · 양성훈</span>
              </div>
              <h1 className="text-xl font-bold mt-0.5">밀착관리 캘린더</h1>
            </div>
            <div className="text-right">
              <div className="text-[10px] text-stone-400 uppercase tracking-widest">시험까지</div>
              <div className="text-2xl font-black text-rose-400 tabular-nums">D-{dL}</div>
            </div>
          </div>

          <div className="mt-3">
            <div className="flex justify-between text-xs text-stone-400 mb-1">
              <span>전체 진도</span>
              <span className="tabular-nums">{stats.done} / {stats.total} ({Math.round(stats.done/(stats.total||1)*100)}%)</span>
            </div>
            <div className="h-2 bg-stone-700 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-rose-500 via-fuchsia-500 to-amber-400 transition-all duration-500"
                style={{ width: `${stats.total ? stats.done/stats.total*100 : 0}%` }} />
            </div>
          </div>

          <div className="mt-3 flex gap-1 p-1 bg-stone-700/50 rounded-lg">
            <button onClick={() => setView('calendar')}
              className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-md text-xs font-bold transition-all ${view==='calendar'?'bg-white text-stone-900 shadow-sm':'text-stone-300'}`}>
              <Cal className="w-3.5 h-3.5" />캘린더
            </button>
            <button onClick={() => setView('courses')}
              className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-md text-xs font-bold transition-all ${view==='courses'?'bg-white text-stone-900 shadow-sm':'text-stone-300'}`}>
              <Book className="w-3.5 h-3.5" />강좌 관리 ({courses.length})
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 py-5 pb-24">
        {view === 'calendar' ? (
          <>
            <section className="mb-5">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-sm font-bold text-stone-700">📊 과목별 진도</span>
              </div>
              <div className="grid grid-cols-2 gap-2">
                {Object.entries(stats.bySub).sort((a,b)=>b[1].total-a[1].total).map(([sub, st]) => {
                  if (!st.total) return null;
                  const pct = Math.round(st.done/st.total*100);
                  const cfg = getSub(sub);
                  return (
                    <div key={sub} className={`${cfg.bg} ${cfg.bd} border rounded-xl p-3`}>
                      <div className="flex justify-between items-baseline mb-1.5">
                        <span className={`text-xs font-bold ${cfg.c}`}>{sub}</span>
                        <span className="text-[11px] text-stone-500 tabular-nums">{st.done}/{st.total}</span>
                      </div>
                      <div className="h-1.5 bg-white/60 rounded-full overflow-hidden">
                        <div className={`h-full ${cfg.br} transition-all duration-500`} style={{width:`${pct}%`}} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>

            <section className="mb-4">
              <div className="flex items-center justify-between gap-2 bg-white rounded-xl border border-stone-200 p-2 shadow-sm">
                <button onClick={() => { const p = fd(addD(pd(ws),-1)); if (pd(p) >= pd(allDates[0])) setAnchor(p); }}
                  disabled={pd(ws) <= pd(allDates[0])}
                  className="p-2 rounded-lg hover:bg-stone-100 disabled:opacity-30">
                  <ChevronLeft className="w-5 h-5" />
                </button>
                <div className="flex-1 text-center">
                  <div className="text-[11px] text-stone-500">이번 주</div>
                  <div className="text-sm font-bold tabular-nums">{ws.slice(5).replace('-','/')} ~ {we.slice(5).replace('-','/')}</div>
                </div>
                <button onClick={() => setAnchor(today)}
                  className="text-xs px-3 py-1.5 bg-stone-800 text-white rounded-lg font-semibold hover:bg-stone-700">오늘</button>
                <button onClick={() => { const n = fd(addD(pd(we),1)); if (pd(n) <= pd(allDates[allDates.length-1])) setAnchor(n); }}
                  disabled={pd(we) >= pd(allDates[allDates.length-1])}
                  className="p-2 rounded-lg hover:bg-stone-100 disabled:opacity-30">
                  <ChevronRight className="w-5 h-5" />
                </button>
              </div>
            </section>

            <section className="space-y-3">
              {wd.map((ds) => {
                const d = schedule[ds];
                if (!d) return null;
                const isT = ds === today;
                const isF = pd(ds) > pd(today);
                const isW = d.wd === '토' || d.wd === '일';
                const isE = d.isExam;
                const dt = d.tasks.reduce((s,t)=>s+t.target,0);
                const dd = d.tasks.reduce((s,t)=>s+Math.min(checked[t.id]||0,t.target),0);
                const all = dt > 0 && dd >= dt;
                const sM = (isT || isW) && missed.length > 0 && !isF;

                return (
                  <div key={ds} className={`bg-white rounded-2xl border shadow-sm overflow-hidden transition-all ${isT?'border-rose-400 ring-2 ring-rose-200':'border-stone-200'} ${isE?'bg-gradient-to-br from-rose-50 via-white to-amber-50':''}`}>
                    <div className={`px-4 py-3 flex items-center justify-between ${isT?'bg-rose-500 text-white':isW?'bg-stone-100':'bg-stone-50'} ${isE?'!bg-gradient-to-r !from-rose-600 !to-red-500 !text-white':''}`}>
                      <div className="flex items-center gap-2">
                        <div className={`w-9 h-9 rounded-lg flex flex-col items-center justify-center font-bold ${isT||isE?'bg-white/20 text-white':'bg-white text-stone-700 border border-stone-200'}`}>
                          <div className="text-[9px] leading-none">{d.wd}</div>
                          <div className="text-sm leading-none mt-0.5 tabular-nums">{Number(ds.slice(8))}</div>
                        </div>
                        <div>
                          <div className={`text-xs font-semibold tabular-nums ${isT||isE?'text-white/90':'text-stone-500'}`}>{Number(ds.slice(5,7))}월 {Number(ds.slice(8))}일</div>
                          {d.special && <div className={`text-[11px] font-bold mt-0.5 ${isT||isE?'text-amber-200':'text-rose-600'}`}>{d.special}</div>}
                        </div>
                      </div>
                      <div className="text-right">
                        {isT && <div className="text-[10px] font-black text-amber-200 tracking-widest">TODAY</div>}
                        {dt > 0 && <div className={`text-xs tabular-nums font-mono ${isT||isE?'text-white/80':'text-stone-500'}`}>{dd}/{dt} {all && '✓'}</div>}
                      </div>
                    </div>
                    <div className="p-3 space-y-2">
                      {d.tasks.map(t => <Task key={t.id} t={t} v={checked[t.id]||0} onT={()=>toggleFull(t)} onA={d=>adjust(t,d)} onE={()=>setQuickEdit(t)} anim={justChecked===t.id} />)}
                      {sM && (
                        <div className={`${d.tasks.length>0?'mt-3 pt-3 border-t-2 border-dashed border-amber-300':''}`}>
                          <div className="flex items-center gap-1.5 mb-2">
                            <Warn className="w-4 h-4 text-amber-600" />
                            <span className="text-xs font-bold text-amber-800">{isT?'어제까지 밀린 · 남는 시간에 만회':'주말 만회'} ({missed.length}개)</span>
                          </div>
                          <div className="space-y-2">
                            {missed.map(t => <Task key={`m-${t.id}`} t={t} v={checked[t.id]||0} onT={()=>toggleFull(t)} onA={d=>adjust(t,d)} onE={()=>setQuickEdit(t)} isMissed od={t.originalDate} anim={justChecked===t.id} />)}
                          </div>
                        </div>
                      )}
                      {d.tasks.length === 0 && !sM && (
                        <div className="text-center text-stone-400 py-8 text-sm">
                          <div className="text-2xl mb-1">{d.isHoliday?'🏖️':'😴'}</div>
                          <div>{d.isHoliday?'휴일이야 · 진짜 쉬어':'쉬는 날'}</div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </section>
          </>
        ) : (
          <Courses courses={courses} config={config} today={today}
            onEdit={setEditing} onDel={deleteCourse}
            onAdd={() => setEditing({ isNew:true, id:null, name:'', subject:'국어', type:'lesson', totalLessons:10, doneLessons:0, unit:'강', targetDate:config.endDate, days:[1,2,3,4], note:'' })}
            onTogH={toggleHoliday} updCfg={updateConfig} />
        )}

        <div className="mt-8 text-center space-y-2">
          <div className="text-[10px] text-stone-400">
            {!HAS_SUPABASE && '⚠️ 로컬 저장 (Supabase 연결 안 됨)'}
            {HAS_SUPABASE && syncStatus==='ok' && '✅ Supabase 동기화 중'}
            {HAS_SUPABASE && syncStatus==='syncing' && '⏳ 동기화 중...'}
            {HAS_SUPABASE && syncStatus==='err' && '⚠️ DB 연결 실패 · 로컬 저장만 됨'}
          </div>
          <button onClick={resetAll} className="inline-flex items-center gap-1.5 text-xs text-stone-400 hover:text-rose-500">
            <Reset className="w-3 h-3" />체크 기록 초기화
          </button>
        </div>
      </main>

      {editing && <CourseForm course={editing} onSave={saveCourse} onClose={()=>setEditing(null)} holidays={config.holidays} config={config} today={today} />}
      {quickEdit && <QuickEdit task={quickEdit} cur={checked[quickEdit.id]||0} onSet={v=>setVal(quickEdit.id,v)} onClose={()=>setQuickEdit(null)} />}
    </div>
  );
}

// ========== 태스크 아이템 ==========
function Task({ t, v, onT, onA, onE, anim, isMissed, od }) {
  const cfg = getSub(t.subject);
  const tgt = t.target;
  const isQ = t.type === 'quota' && tgt > 1;
  const done = v >= tgt, partial = v > 0 && v < tgt, over = v > tgt;
  const step = tgt >= 100 ? 10 : tgt >= 20 ? 5 : 1;

  return (
    <div className={`flex items-start gap-2 p-3 rounded-xl transition-all ${done?'bg-stone-50 border border-stone-200':`${cfg.bg} border ${cfg.bd}`} ${isMissed&&!done?'ring-1 ring-amber-300':''}`}>
      <button onClick={onT} className={`flex-shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center transition-all mt-0.5 ${done?'bg-emerald-500 border-emerald-500':partial?'bg-amber-100 border-amber-400':`bg-white ${cfg.bd.replace('-200','-400')}`} ${anim?'pop':''}`}>
        {done && <Check className="w-4 h-4 text-white" />}
        {partial && !done && <div className="w-2.5 h-2.5 bg-amber-500 rounded-sm" />}
      </button>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${cfg.ch}`}>{t.subject}</span>
          {isMissed && od && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-200 text-amber-900 tabular-nums">{Number(od.slice(5,7))}/{Number(od.slice(8))} 놓침</span>}
          {over && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-purple-100 text-purple-700">🔥 초과</span>}
        </div>
        <div className={`text-sm font-semibold ${done&&!over?'text-stone-400 line-through':'text-stone-800'}`}>
          {t.text}
          {isQ && <span className="ml-1 text-stone-500 font-normal">{tgt}{t.unit}</span>}
        </div>
        {t.note && <div className={`text-xs mt-0.5 ${done&&!over?'text-stone-300':'text-stone-500'}`}>{t.note}</div>}
        {isQ && (
          <div className="mt-2 flex items-center gap-2">
            <button onClick={()=>onA(-step)} disabled={v<=0} className="w-7 h-7 flex items-center justify-center bg-white border border-stone-300 rounded-md hover:bg-stone-100 active:scale-95 disabled:opacity-30"><Minus className="w-3.5 h-3.5" /></button>
            <button onClick={onE} className="flex-1 min-w-0 text-center tabular-nums font-mono font-bold text-sm py-1.5 rounded-md bg-white border border-stone-300 hover:bg-stone-100">
              <span className={over?'text-purple-700':partial?'text-amber-700':done?'text-emerald-700':'text-stone-700'}>{v}</span>
              <span className="text-stone-400"> / {tgt}{t.unit}</span>
            </button>
            <button onClick={()=>onA(step)} className="w-7 h-7 flex items-center justify-center bg-white border border-stone-300 rounded-md hover:bg-stone-100 active:scale-95"><Plus className="w-3.5 h-3.5" /></button>
          </div>
        )}
      </div>
    </div>
  );
}

// ========== QuickEdit ==========
function QuickEdit({ task, cur, onSet, onClose }) {
  const [inp, setInp] = useState(String(cur));
  const cfg = getSub(task.subject);
  const save = () => { const n = parseInt(inp,10); if (!isNaN(n)) onSet(n); onClose(); };
  const qv = [0, Math.floor(task.target/2), task.target, task.target + Math.floor(task.target*0.3)];

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in" onClick={onClose}>
      <div className="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-3xl shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="px-4 py-3 border-b border-stone-200 flex items-center justify-between">
          <h3 className="text-base font-bold">몇 개 했어?</h3>
          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded-lg"><X className="w-5 h-5" /></button>
        </div>
        <div className="p-4 space-y-4">
          <div className={`${cfg.bg} ${cfg.bd} border rounded-xl p-3`}>
            <div className={`text-[10px] font-bold ${cfg.c} mb-0.5`}>{task.subject}</div>
            <div className="text-sm font-bold">{task.text}</div>
            <div className="text-xs text-stone-500 mt-0.5">목표: {task.target}{task.unit}</div>
          </div>
          <div>
            <input type="number" value={inp} onChange={e=>setInp(e.target.value)} onFocus={e=>e.target.select()} autoFocus
              className="w-full px-4 py-4 text-3xl font-black text-center tabular-nums bg-stone-50 border-2 border-stone-200 rounded-xl focus:outline-none focus:border-rose-400" />
            <div className="text-center text-stone-500 text-sm mt-1 tabular-nums">/ {task.target}{task.unit}</div>
          </div>
          <div>
            <div className="text-[11px] text-stone-500 font-bold mb-1.5 tracking-wide">빠른 선택</div>
            <div className="grid grid-cols-4 gap-1.5">
              {qv.map((v,i) => (
                <button key={i} onClick={()=>setInp(String(v))}
                  className={`py-2 rounded-lg text-sm font-bold tabular-nums ${Number(inp)===v?'bg-rose-500 text-white':'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>{v}</button>
              ))}
            </div>
          </div>
        </div>
        <div className="border-t border-stone-200 p-3 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg text-sm font-bold">취소</button>
          <button onClick={save} className="flex-[2] py-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-sm font-bold">저장</button>
        </div>
      </div>
    </div>
  );
}

// ========== 강좌 뷰 ==========

  const [hO, setHO] = useState(false);

      <section className="mb-4 bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-sm">

          <ChevronRight className={`w-4 h-4 text-stone-400 transition-transform ${cO?'rotate-90':''}`} />
        </button>

          <div className="px-4 pb-4 pt-1 space-y-2 fade-in">

                <input type="date" value={config.startDate} onChange={e=>updCfg({...config, startDate:e.target.value})}

                <input type="date" value={config.endDate} onChange={e=>updCfg({...config, endDate:e.target.value})}

                </span>
              ))}

      <section className="space-y-3 mb-4">
        <div className="flex items-center justify-between">

            <Plus className="w-4 h-4" />강좌 추가
          </button>
        </div>
        {courses.length===0 && (
          <div className="text-center py-12 text-stone-400 bg-white rounded-xl border border-dashed border-stone-300">

}

function CCard({ c, h, cfg, td, onE, onD }) {
  const col = getSub(c.subject);
  const s = cStats(c, h, cfg, td);
  const DOW = ['일','월','화','수','목','금','토'];
  return (
    <div className={`bg-white border ${col.bd} rounded-2xl shadow-sm overflow-hidden`}>
      <div className={`px-4 py-3 ${col.bg} border-b ${col.bd} flex items-start justify-between gap-2`}>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${col.ch}`}>{c.subject}</span>
            <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded bg-white text-stone-600 border border-stone-200">{c.type==='lesson'?'진도형':'분량형'}</span>
          </div>
          <div className="text-sm font-bold text-stone-800 truncate">{c.name}</div>
          {c.note && <div className="text-[11px] text-stone-500 mt-0.5">{c.note}</div>}
        </div>
        <div className="flex gap-1">
          <button onClick={onE} className="p-1.5 hover:bg-white rounded-lg"><Edit className="w-4 h-4" /></button>
          <button onClick={onD} className="p-1.5 hover:bg-white rounded-lg hover:text-rose-600"><Trash className="w-4 h-4" /></button>
        </div>
      </div>
      <div className="px-4 py-3 text-xs space-y-1.5">
        {c.type==='lesson' ? (
          <>
            <div className="flex justify-between"><span className="text-stone-500">진도</span><span className="font-semibold tabular-nums">{c.doneLessons} / {c.totalLessons}{c.unit}</span></div>
            <div className="flex justify-between"><span className="text-stone-500">남은 분량</span><span className="font-semibold tabular-nums">{s.remaining}{c.unit}</span></div>
            <div className="flex justify-between"><span className="text-stone-500">학습일</span><span className="font-semibold tabular-nums">{s.studyDays}일</span></div>
            <div className="flex justify-between"><span className="text-stone-500">완강 목표</span><span className="font-semibold tabular-nums">{c.targetDate}</span></div>
            {!s.feasible && s.remaining>0 && (
              <div className="flex items-center gap-1.5 mt-2 px-2 py-1.5 bg-rose-50 border border-rose-200 rounded-lg">
                <Warn className="w-3.5 h-3.5 text-rose-600" /><span className="text-[11px] text-rose-700 font-semibold">학습일보다 남은 분량이 많음</span>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="flex justify-between"><span className="text-stone-500">하루 분량</span><span className="font-semibold tabular-nums">{c.dailyAmount}{c.unit}</span></div>
            <div className="flex justify-between"><span className="text-stone-500">학습일</span><span className="font-semibold tabular-nums">{s.studyDays}일</span></div>
            <div className="flex justify-between"><span className="text-stone-500">총 분량</span><span className="font-semibold tabular-nums">{s.total}{c.unit}</span></div>
          </>
        )}
        <div className="flex justify-between items-center pt-1">
          <span className="text-stone-500">요일</span>
          <div className="flex gap-0.5">
            {[0,1,2,3,4,5,6].map(d => (
              <span key={d} className={`w-5 h-5 rounded flex items-center justify-center text-[9px] font-bold ${c.days.includes(d)?`${col.br} text-white`:'bg-stone-100 text-stone-400'}`}>{DOW[d]}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ========== 강좌 폼 ==========
function CourseForm({ course, onSave, onClose, holidays, config, today }) {
  const [f, setF] = useState(course);
  const up = (p) => setF(v => ({...v, ...p}));
  const tD = (d) => { const ds = f.days.includes(d)?f.days.filter(x=>x!==d):[...f.days,d].sort(); up({days:ds}); };
  const ok = f.name && f.days.length>0 && (f.type==='lesson' ? f.totalLessons>0 && f.targetDate : f.dailyAmount>0);
  const tmp = f.name ? cStats(f, holidays, config, today) : null;
  const DOW = ['일','월','화','수','목','금','토'];

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
      <div className="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl max-h-[90vh] overflow-y-auto shadow-2xl">
        <div className="sticky top-0 bg-white border-b border-stone-200 px-4 py-3 flex items-center justify-between z-10">
          <h3 className="text-base font-bold">{course.isNew?'새 강좌 추가':'강좌 편집'}</h3>
          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded-lg"><X className="w-5 h-5" /></button>
        </div>
        <div className="p-4 space-y-4">
          <Row label="강좌 이름" req>
            <input type="text" value={f.name} onChange={e=>up({name:e.target.value})} placeholder="예: 수능특강 국어"
              className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-rose-300" />
          </Row>
          <Row label="과목 분류">
            <div className="grid grid-cols-4 gap-1.5">
              {SUB_LIST.map(s => {
                const sc = getSub(s), a = f.subject === s;
                return <button key={s} onClick={()=>up({subject:s})}
                  className={`py-2 rounded-lg text-xs font-semibold ${a?`${sc.ch} ring-2 ring-offset-1 ring-stone-800`:'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>{s}</button>;
              })}
            </div>
          </Row>
          <Row label="타입">
            <div className="grid grid-cols-2 gap-2">
              <button onClick={()=>up({type:'lesson'})} className={`p-3 rounded-xl border-2 text-left ${f.type==='lesson'?'bg-rose-50 border-rose-400':'bg-white border-stone-200'}`}>
                <div className={`flex items-center gap-1.5 mb-0.5 ${f.type==='lesson'?'text-rose-700':'text-stone-600'}`}><Book className="w-4 h-4" /><span className="text-xs font-bold">진도형</span></div>
                <div className="text-[10px] text-stone-500">총 N강 중 1강씩</div>
              </button>
              <button onClick={()=>up({type:'quota'})} className={`p-3 rounded-xl border-2 text-left ${f.type==='quota'?'bg-rose-50 border-rose-400':'bg-white border-stone-200'}`}>
                <div className={`flex items-center gap-1.5 mb-0.5 ${f.type==='quota'?'text-rose-700':'text-stone-600'}`}><Spark className="w-4 h-4" /><span className="text-xs font-bold">분량형</span></div>
                <div className="text-[10px] text-stone-500">하루 N개씩 +/-</div>
              </button>
            </div>
          </Row>
          {f.type==='lesson' ? (
            <>
              <div className="grid grid-cols-2 gap-2">
                <Row label="총 분량" req>
                  <div className="flex gap-1">
                    <input type="number" min="1" value={f.totalLessons||''} onChange={e=>up({totalLessons:Number(e.target.value)})}
                      className="flex-1 px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                    <input type="text" value={f.unit||'강'} onChange={e=>up({unit:e.target.value})}
                      className="w-14 px-2 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm text-center" />
                  </div>
                </Row>
                <Row label="이미 한 분량">
                  <input type="number" min="0" value={f.doneLessons||0} onChange={e=>up({doneLessons:Number(e.target.value)})}
                    className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                </Row>
              </div>
              <Row label="완강 목표일" req>
                <input type="date" value={f.targetDate||''} onChange={e=>up({targetDate:e.target.value})}
                  className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm" />
              </Row>
              <Row label="완강 후 할 일 (선택)">
                <input type="text" value={f.postCompleteText||''} onChange={e=>up({postCompleteText:e.target.value})} placeholder="예: 기출 1회"
                  className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm" />
              </Row>
            </>
          ) : (
            <Row label="하루 분량" req>
              <div className="flex gap-1">
                <input type="number" min="1" value={f.dailyAmount||''} onChange={e=>up({dailyAmount:Number(e.target.value)})}
                  className="flex-1 px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                <input type="text" value={f.unit||'개'} onChange={e=>up({unit:e.target.value})}
                  className="w-14 px-2 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm text-center" />
              </div>
            </Row>
          )}
          <Row label="배치 요일" req>
            <div className="grid grid-cols-7 gap-1">
              {DOW.map((n, d) => (
                <button key={d} onClick={()=>tD(d)} className={`py-2.5 rounded-lg text-xs font-bold ${f.days.includes(d)?'bg-rose-500 text-white':'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>{n}</button>
              ))}
            </div>
          </Row>
          <Row label="메모 (선택)">
            <input type="text" value={f.note||''} onChange={e=>up({note:e.target.value})} placeholder="예: 자투리 시간 활용"
              className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm" />
          </Row>
          {tmp && f.days.length>0 && (
            <div className="bg-gradient-to-br from-stone-50 to-stone-100 border border-stone-200 rounded-xl p-3">
              <div className="flex items-center gap-1.5 mb-2"><Spark className="w-3.5 h-3.5 text-stone-600" /><span className="text-xs font-bold text-stone-700">미리보기</span></div>
              <div className="text-xs space-y-1 text-stone-600">
                <div>• 오늘부터 {f.type==='lesson'?f.targetDate:config.endDate}까지 학습일 <b className="tabular-nums">{tmp.studyDays}일</b></div>
                {f.type==='lesson' ? (
                  <>
                    <div>• 남은 분량 <b className="tabular-nums">{tmp.remaining}{f.unit}</b></div>
                    <div>• 하루 <b className="tabular-nums">{tmp.pace<1?'1'+f.unit+' (여유)':tmp.pace.toFixed(1)+f.unit}</b>씩</div>
                    {!tmp.feasible && tmp.remaining>0 && (
                      <div className="flex items-center gap-1.5 mt-1.5 text-rose-700 font-semibold"><Warn className="w-3 h-3" />학습일보다 남은 분량이 많음!</div>
                    )}
                  </>
                ) : <div>• 총 <b className="tabular-nums">{tmp.total}{f.unit}</b> 풀게 됨</div>}
              </div>
            </div>
          )}
        </div>
        <div className="sticky bottom-0 bg-white border-t border-stone-200 px-4 py-3 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg text-sm font-bold">취소</button>
          <button onClick={()=>ok && onSave(f)} disabled={!ok}
            className="flex-[2] py-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-sm font-bold disabled:bg-stone-300 disabled:cursor-not-allowed">저장</button>
        </div>
      </div>
    </div>
  );
}

function Row({ label, children, req }) {
  return (
    <div>
      <label className="block text-[11px] font-bold text-stone-600 mb-1 tracking-wide">{label}{req && <span className="text-rose-500 ml-0.5">*</span>}</label>
      {children}
    </div>
  );
}

// 실행
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
