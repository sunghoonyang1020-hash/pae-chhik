// ========== 날짜 헬퍼 ==========
const pd = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const fd = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addD = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const weekDates = (a) => { const s = new Date(pd(a)); s.setDate(s.getDate()-s.getDay()); return Array.from({length:7},(_,i)=>fd(addD(s,i))); };
const dow = (ds) => pd(ds).getDay();
const dowN = (ds) => ['일','월','화','수','목','금','토'][dow(ds)];
const dDay = (f, t) => Math.ceil((pd(t) - pd(f)) / 86400000);
const daysBtw = (f, t) => { const o=[]; let c=pd(f); const e=pd(t); while(c<=e){o.push(fd(c)); c=addD(c,1);} return o; };
const isUUID = (s) => typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);

};

// ========== 스케줄 빌더 ==========
function buildSchedule(courses, holidays, config) {
  const s = {};
  const all = daysBtw(config.startDate, config.endDate);
  for (const ds of all) {
    const isH = holidays.includes(ds);
    s[ds] = { wd:dowN(ds), special: isH?'🏖️ 휴일 · 전면 휴식':null, tasks:[], isHoliday:isH };
  }
  const sorted = [...courses].sort((a,b) => (a.sortOrder??99)-(b.sortOrder??99));
  
  for (const c of sorted) {
    if (c.type === 'custom') {
      const dates = c.customDates || [];
      for (const ds of dates) {
        if (!s[ds]) continue;
        if (s[ds].isHoliday) continue;
        const tid = `${c.id}:${ds}`;
        s[ds].tasks.push({ 
          id:tid, courseId:c.id, subject:c.subject, 
          text:c.name, note:c.note, unit:c.unit || '', 
          target:1, type:'custom', carryable:!c.nonCarryable 
        });
      }
      continue;
    }
    
    let p = c.doneLessons || 0;
    for (const ds of all) {
      if (s[ds].isHoliday) continue;
      if (!c.days.includes(dow(ds))) continue;
      const tid = `${c.id}:${ds}`;
      let text, target;
      if (c.type === 'lesson') {
        const perDay = c.dailyAmount || 1; // 하루 N강 (기본 1)
        const startLesson = p + 1;
        p += perDay;
        target = perDay;
        const remaining = (c.totalLessons || 0) - (startLesson - 1);
        if (remaining <= 0) {
          // 이미 다 끝남 → 완강 후 텍스트
          if (c.postCompleteText) { 
            text = `${c.name} · ${c.postCompleteText}`;
            target = 1;
          } else continue;
        } else if (remaining < perDay) {
          // 마지막 부분 (남은 분량 < 하루 분량)
          const endLesson = startLesson + remaining - 1;
          text = startLesson === endLesson 
            ? `${c.name} ${startLesson}${c.unit}`
            : `${c.name} ${startLesson}~${endLesson}${c.unit}`;
          target = remaining;
        } else {
          // 정상 (perDay 만큼)
          const endLesson = startLesson + perDay - 1;
          text = startLesson === endLesson 
            ? `${c.name} ${startLesson}${c.unit}`
            : `${c.name} ${startLesson}~${endLesson}${c.unit}`;
        }
      } else {
        target = c.dailyAmount || 1;
        text = c.name;
      }
      s[ds].tasks.push({ id:tid, courseId:c.id, subject:c.subject, text, note:c.note, unit:c.unit, target, type:c.type, carryable:!c.nonCarryable });
    }
  }
  
  const first = config.startDate;
  if (s[first] && s[first].tasks.length > 0 && !s[first].special) {
    s[first].special = '🎯 시작일';
  }
  
  if (s[config.endDate]) {
    s[config.endDate].special = `🚀 ${config.examName} D-DAY`;
    s[config.endDate].isExam = true;
    s[config.endDate].tasks = [{ id:'exam:day', courseId:'exam', subject:'기타', text:config.examName+' — 조져버리자', target:1, type:'lesson', carryable:false, unit:'' }];
  }
  return s;
}

function cStats(c, holidays, cfg, today) {
  if (c.type === 'custom') {
    const dates = c.customDates || [];
    const future = dates.filter(d => pd(d) >= pd(today) && pd(d) <= pd(cfg.endDate));
    return { type:'custom', scheduled:dates.length, upcoming:future.length };
  }
  const tgt = c.targetDate || cfg.endDate;
  const from = pd(today) > pd(cfg.startDate) ? today : cfg.startDate;
  const all = daysBtw(from, tgt);
  let sd = 0;
  for (const ds of all) { if (holidays.includes(ds)) continue; if (c.days.includes(dow(ds))) sd++; }
  if (c.type === 'lesson') {
    const rem = Math.max(0, (c.totalLessons||0) - (c.doneLessons||0));
    const perDay = c.dailyAmount || 1;
    const lessonDaysNeeded = Math.ceil(rem / perDay); // 필요 학습일
    const pace = sd > 0 ? rem/sd : 0;
    return { studyDays:sd, remaining:rem, pace, feasible: sd >= lessonDaysNeeded, perDay, lessonDaysNeeded };
  }
  return { studyDays:sd, total:sd * (c.dailyAmount||0) };
}

  const [expandedPast, setExpandedPast] = useState(false);
  const [popTaskId, setPopTaskId] = useState(null);

  // 초기 로드
  useEffect(() => {
    (async () => {
      if (!sb) {
        setCourses(DEFAULT_COURSES.map((c, i) => ({ ...c, id: `local-${i}` })));
        const real = fd(new Date());
        if (real >= DEFAULT_CONFIG.startDate && real <= DEFAULT_CONFIG.endDate) {
          setToday(real); setAnchor(real);
        }
        setLoading(false);
        return;
      }
      
      try {
        setSyncStatus('syncing');
        const cR = await sb.from('courses').select('*').order('sort_order');
        if (cR.error) throw cR.error;
        
        let coursesFromDb;
        if (cR.data && cR.data.length > 0) {
          coursesFromDb = cR.data.map(fromDb);
        } else {
          const { data, error } = await sb.from('courses').insert(DEFAULT_COURSES.map(toDb)).select();
          if (error) throw error;
          coursesFromDb = data.map(fromDb);
        }
        
        const [cfR, chR] = await Promise.all([
          sb.from('user_config').select('*').eq('id', 1).maybeSingle(),
          sb.from('task_checks').select('*'),
        ]);
        if (cfR.error) throw cfR.error;
        if (chR.error) throw chR.error;
        
        if (cfR.data) {
          const cfg = {
            examName: cfR.data.exam_name,
            startDate: cfR.data.start_date,
            endDate: cfR.data.end_date,
            holidays: cfR.data.holidays || [],
          };
          setConfig(cfg);
          
          const real = fd(new Date());
          if (real >= cfg.startDate && real <= cfg.endDate) {
            setToday(real); setAnchor(real);
          } else {
            setToday(cfg.startDate); setAnchor(cfg.startDate);
          }
        }
        
        setCourses(coursesFromDb);
        
        if (chR.data) {
          const m = {};
          for (const r of chR.data) {
            // updated_at에서 날짜만 추출해서 완료일로 저장
            const ca = r.updated_at ? r.updated_at.slice(0, 10) : r.task_date;
            m[`${r.course_id}:${r.task_date}`] = { v: r.achieved, ca };
          }
          setChecked(m);
        }
        
        setSyncStatus('ok');
      } catch (e) {
        console.error('동기화 실패:', e);
        setSyncStatus('err');
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const saveCheckDb = useCallback(async (cid, td, v) => {
    if (!sb || cid === 'exam' || !isUUID(cid)) return;
    try {
      if (v <= 0) {
        await sb.from('task_checks').delete().eq('course_id', cid).eq('task_date', td);
      } else {
        await sb.from('task_checks').upsert({
          course_id: cid, task_date: td, achieved: v,
          updated_at: new Date().toISOString(),
        });
      }
    } catch (e) { console.error(e); }
  }, []);

  // ca 결정 헬퍼
  // forceToday=true면 무조건 오늘 (만회 섹션에서 체크한 경우)
  // 아니면 예정일이 오늘 이전이면 예정일, 오늘 이후면 오늘
  const decideCA = (taskDate, forceToday = false) => {
    const todayStr = fd(new Date());
    if (forceToday) return todayStr;
    return pd(taskDate) < pd(todayStr) ? taskDate : todayStr;
  };

  // 완료일 바탕으로 DB upsert (updated_at을 완료일 기준으로)
  const saveCheckDbWithCA = useCallback(async (cid, td, v, ca) => {
    if (!sb || cid === 'exam' || !isUUID(cid)) return;
    try {
      if (v <= 0) {
        await sb.from('task_checks').delete().eq('course_id', cid).eq('task_date', td);
      } else {
        // ca를 ISO datetime으로 (정오 시각 사용, 시간대 문제 회피)
        const caIso = new Date(ca + 'T12:00:00').toISOString();
        await sb.from('task_checks').upsert({
          course_id: cid, task_date: td, achieved: v,
          updated_at: caIso,
        });
      }
    } catch (e) { console.error(e); }
  }, []);

  // 체크: 완료일(ca) 기록 포함
  const toggleFull = (t, fromMissed = false) => {
    const [cid, td] = t.id.split(':');
    if (cid === 'exam') return;
    const ca = decideCA(td, fromMissed);
    setChecked(prev => {
      const cur = getVal(prev[t.id]);
      const nv = cur >= t.target ? 0 : t.target;
      saveCheckDbWithCA(cid, td, nv, ca);
      if (nv === 0) {
        const { [t.id]: _, ...rest } = prev;
        return rest;
      }
      return { ...prev, [t.id]: { v: nv, ca } };
    });
    const curVal = getVal(checked[t.id]);
    if (curVal < t.target) {
      setPopTaskId(t.id);
      setTimeout(() => setPopTaskId(null), 260);
    }
  };

  const adjust = (t, delta, fromMissed = false) => {
    const [cid, td] = t.id.split(':');
    if (cid === 'exam') return;
    const ca = decideCA(td, fromMissed);
    setChecked(prev => {
      const cur = getVal(prev[t.id]);
      const v = Math.max(0, cur + delta);
      saveCheckDbWithCA(cid, td, v, ca);
      if (v === 0) {
        const { [t.id]: _, ...rest } = prev;
        return rest;
      }
      return { ...prev, [t.id]: { v, ca } };
    });
  };

  const setVal = (tid, v, fromMissed = false) => {
    const [cid, td] = tid.split(':');
    const val = Math.max(0, v);
    const ca = decideCA(td, fromMissed);
    setChecked(prev => {
      saveCheckDbWithCA(cid, td, val, ca);
      if (val === 0) {
        const { [tid]: _, ...rest } = prev;
        return rest;
      }
      return { ...prev, [tid]: { v: val, ca } };
    });
  };

  const resetAll = async () => {
    if (!confirm('체크 기록 전부 초기화할거야?')) return;
    setChecked({});
    if (sb) { try { await sb.from('task_checks').delete().not('course_id','is',null); } catch(e){} }
  };

  const saveCourse = async (form) => {
    try {
      if (form.isNew) {
        const { isNew, id, ...rest } = form;
        let created;
        if (sb) {
          const { data, error } = await sb.from('courses').insert(toDb(rest)).select().single();
          if (error) throw error;
          created = fromDb(data);
        } else {
          created = { ...rest, id: 'local-' + Date.now() };
        }
        setCourses(prev => [...prev, created]);
      } else {
        let updated = form;
        if (sb) {
          const { data, error } = await sb.from('courses').update(toDb(form)).eq('id', form.id).select().single();
          if (error) throw error;
          updated = fromDb(data);
        }
        setCourses(prev => prev.map(c => c.id === updated.id ? updated : c));
      }
      setEditing(null);
    } catch (e) { alert('저장 실패: ' + e.message); }
  };

  const deleteCourse = async (id) => {
    if (!confirm('이 강좌 삭제할거야? 체크 기록도 같이 날아가.')) return;
    if (sb) { try { await sb.from('courses').delete().eq('id', id); } catch(e){} }
    setCourses(prev => prev.filter(c => c.id !== id));
    setChecked(prev => {
      const nc = { ...prev };
      for (const k of Object.keys(nc)) if (k.startsWith(`${id}:`)) delete nc[k];
      return nc;
    });
  };

  const toggleHoliday = async (ds) => {
    const next = config.holidays.includes(ds) ? config.holidays.filter(h=>h!==ds) : [...config.holidays, ds];
    const nc = { ...config, holidays: next };
    setConfig(nc);
    if (sb) { try { await sb.from('user_config').update({ holidays: next }).eq('id', 1); } catch(e){} }
  };

  const updateConfig = async (c) => {
    setConfig(c);
    if (sb) { try { await sb.from('user_config').update({ exam_name:c.examName, start_date:c.startDate, end_date:c.endDate, holidays:c.holidays }).eq('id',1); } catch(e){} }
  };

  const schedule = useMemo(() => buildSchedule(courses, config.holidays, config), [courses, config]);
  const allDates = useMemo(() => Object.keys(schedule).sort(), [schedule]);
  const wd = useMemo(() => weekDates(anchor), [anchor]);

  // 만회: 진도형/단발형만 (분량형, exam 제외)
  const missed = useMemo(() => {
    const out = [];
    for (const ds of allDates) {
      if (pd(ds) >= pd(today)) break;
      const d = schedule[ds];
      if (!d || d.isHoliday) continue;
      for (const t of d.tasks) {
        if (!t.carryable) continue;
        if (t.type === 'quota') continue; // 분량형 제외
        if (t.type === 'custom') continue; // 단발형 제외
        if (t.courseId === 'exam') continue;
        const v = getVal(checked[t.id]);
        if (v < t.target) out.push({ ...t, originalDate: ds });
      }
    }
    return out;
  }, [schedule, checked, today, allDates]);

  const stats = useMemo(() => {
    // 모든 태스크를 "1개 = 1"로 정규화. 분량형도 15문제 완료 = 1, 8/15 = 0.53
    let total = 0, done = 0;
    const bySub = {};
    for (const ds of allDates) {
      for (const t of schedule[ds].tasks) {
        if (t.courseId === 'exam') continue;
        const d = normDone(getVal(checked[t.id]), t.target);
        total += 1; done += d;
        if (!bySub[t.subject]) bySub[t.subject] = { total:0, done:0 };
        bySub[t.subject].total += 1;
        bySub[t.subject].done += d;
      }
    }
    return { total, done, bySub };
  }, [schedule, checked, allDates]);

  const dL = dDay(today, config.endDate);
  const [ws, we] = [wd[0], wd[6]];
  const pastDates = wd.filter(ds => pd(ds) < pd(today));
  const currentDates = wd.filter(ds => pd(ds) >= pd(today));

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-stone-50">
        <div className="text-center">
          <div className="text-4xl mb-3">📚</div>
          <div className="text-sm text-stone-500 font-semibold">로딩중...</div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-stone-50 text-stone-800">
      <header className="bg-gradient-to-br from-stone-900 via-stone-800 to-stone-900 text-stone-100 sticky top-0 z-20 shadow-lg">
        <div className="max-w-3xl mx-auto px-4 py-4">
          <div className="flex items-center justify-between">
            <div>
              <div className="flex items-center gap-2 text-[11px] tracking-widest text-stone-400 uppercase">
                <Target className="w-3 h-3" /><span>{config.examName} · 양성훈</span>
              </div>
              <h1 className="text-xl font-bold mt-0.5">밀착관리 캘린더</h1>
            </div>
            <div className="text-right">
              <div className="text-[10px] text-stone-400 uppercase tracking-widest">시험까지</div>
              <div className="text-2xl font-black text-rose-400 tabular-nums">D-{dL}</div>
            </div>
          </div>

          <div className="mt-3">
            <div className="flex justify-between text-xs text-stone-400 mb-1">
              <span>전체 진도</span>
              <span className="tabular-nums">{Math.round(stats.done)} / {stats.total} ({Math.round(stats.done/(stats.total||1)*100)}%)</span>
            </div>
            <div className="h-2 bg-stone-700 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-rose-500 via-fuchsia-500 to-amber-400 transition-all duration-500"
                style={{ width: `${stats.total ? stats.done/stats.total*100 : 0}%` }} />
            </div>
          </div>

          <div className="mt-3 flex gap-1 p-1 bg-stone-700/50 rounded-lg">
            <button onClick={() => setView('calendar')}
              className={`flex-1 flex items-center justify-center gap-1 py-2 rounded-md text-[11px] font-bold transition-colors ${view==='calendar'?'bg-white text-stone-900':'text-stone-300'}`}>
              <Cal className="w-3.5 h-3.5" />캘린더
            </button>
            <button onClick={() => setView('achievement')}
              className={`flex-1 flex items-center justify-center gap-1 py-2 rounded-md text-[11px] font-bold transition-colors ${view==='achievement'?'bg-white text-stone-900':'text-stone-300'}`}>
              <Trophy className="w-3.5 h-3.5" />달성
            </button>
            <button onClick={() => setView('courses')}
              className={`flex-1 flex items-center justify-center gap-1 py-2 rounded-md text-[11px] font-bold transition-colors ${view==='courses'?'bg-white text-stone-900':'text-stone-300'}`}>
              <Book className="w-3.5 h-3.5" />강좌 ({courses.length})
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 py-5 pb-24">
        {view === 'calendar' && (
          <div className="fade-in">
            <section className="mb-5">
              <div className="flex items-center gap-2 mb-3">
                <Trending className="w-4 h-4 text-stone-600" />
                <h2 className="text-sm font-bold text-stone-700">과목별 진도</h2>
              </div>
              <div className="grid grid-cols-2 gap-2">
                {Object.entries(stats.bySub).sort((a,b)=>b[1].total-a[1].total).map(([sub, st]) => {
                  if (!st.total) return null;
                  const pct = Math.round(st.done/st.total*100);
                  const cfg = getSub(sub);
                  return (
                    <div key={sub} className={`${cfg.bg} ${cfg.bd} border rounded-xl p-3`}>
                      <div className="flex justify-between items-baseline mb-1.5">
                        <span className={`text-xs font-bold ${cfg.c}`}>{sub}</span>
                        <span className="text-[11px] text-stone-500 tabular-nums">{Math.round(st.done)}/{st.total}</span>
                      </div>
                      <div className="h-1.5 bg-white/60 rounded-full overflow-hidden">
                        <div className={`h-full ${cfg.br} transition-all duration-500`} style={{width:`${pct}%`}} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>

            <section className="mb-4">
              <div className="flex items-center justify-between gap-2 bg-white rounded-xl border border-stone-200 p-2 shadow-sm">
                <button onClick={() => { const p = fd(addD(pd(ws),-1)); if (pd(p) >= pd(allDates[0])) { setAnchor(p); setExpandedPast(false); } }}
                  disabled={pd(ws) <= pd(allDates[0])}
                  className="p-2 rounded-lg hover:bg-stone-100 disabled:opacity-30">
                  <ChevronLeft className="w-5 h-5" />
                </button>
                <div className="flex-1 text-center">
                  <div className="text-[11px] text-stone-500">이번 주</div>
                  <div className="text-sm font-bold tabular-nums">{ws.slice(5).replace('-','/')} ~ {we.slice(5).replace('-','/')}</div>
                </div>
                <button onClick={() => { setAnchor(today); setExpandedPast(false); }}
                  className="text-xs px-3 py-1.5 bg-stone-800 text-white rounded-lg font-semibold hover:bg-stone-700">오늘</button>
                <button onClick={() => { const n = fd(addD(pd(we),1)); if (pd(n) <= pd(allDates[allDates.length-1])) { setAnchor(n); setExpandedPast(false); } }}
                  disabled={pd(we) >= pd(allDates[allDates.length-1])}
                  className="p-2 rounded-lg hover:bg-stone-100 disabled:opacity-30">
                  <ChevronRight className="w-5 h-5" />
                </button>
              </div>
            </section>

            {pastDates.length > 0 && (
              <section className="mb-3">
                <button onClick={() => setExpandedPast(!expandedPast)}
                  className="w-full flex items-center justify-between gap-2 bg-white rounded-xl border border-stone-200 p-3 shadow-sm hover:bg-stone-50">
                  <div className="flex items-center gap-2">
                    <ChevronDown className={`w-4 h-4 text-stone-400 transition-transform ${expandedPast?'rotate-180':''}`} />
                    <span className="text-xs font-bold text-stone-500">
                      지난 날짜 {pastDates.length}일 ({pastDates[0].slice(5).replace('-','/')}~{pastDates[pastDates.length-1].slice(5).replace('-','/')})
                    </span>
                  </div>
                  {!expandedPast && (
                    <div className="flex gap-1">
                      {pastDates.map(ds => (
                        <span key={ds} className="text-[10px] text-stone-400 tabular-nums">{Number(ds.slice(8))}{dowN(ds)}</span>
                      ))}
                    </div>
                  )}
                </button>
                
                {expandedPast && (
                  <div className="space-y-3 mt-3">
                    {pastDates.map((ds) => <DayCard key={ds} ds={ds} schedule={schedule} today={today} checked={checked} missed={[]} showMissed={false} onToggle={toggleFull} onAdjust={adjust} onQuickEdit={setQuickEdit} popTaskId={popTaskId} />)}
                  </div>
                )}
              </section>
            )}

            <section className="space-y-3">
              {currentDates.map((ds) => {
                const isToday = ds === today;
                const showMissed = isToday && missed.length > 0;
                return (
                  <DayCard key={ds} ds={ds} schedule={schedule} today={today} checked={checked}
                    missed={showMissed ? missed : []} showMissed={showMissed}
                    onToggle={toggleFull} onAdjust={adjust} onQuickEdit={setQuickEdit} popTaskId={popTaskId} />
                );
              })}
            </section>
          </div>
        )}

        {view === 'achievement' && (
          <div className="fade-in">
            <Achievement courses={courses} checked={checked} config={config} today={today} schedule={schedule} />
          </div>
        )}

        {view === 'courses' && (
          <div className="fade-in">
            <Courses courses={courses} config={config} today={today}
              onEdit={setEditing} onDel={deleteCourse}
              onAdd={() => setEditing({ isNew:true, id:null, name:'', subject:'국어', type:'lesson', totalLessons:10, doneLessons:0, unit:'강', targetDate:config.endDate, days:[1,2,3,4], note:'' })}
              onTogH={toggleHoliday} updCfg={updateConfig} />
          </div>
        )}

        <div className="mt-8 text-center space-y-2">
          <div className="text-[10px] text-stone-400">
            {!HAS_SUPABASE && '⚠️ 로컬 저장 (Supabase 연결 안 됨)'}
            {HAS_SUPABASE && syncStatus==='ok' && '✅ Supabase 동기화 중'}
            {HAS_SUPABASE && syncStatus==='syncing' && '⏳ 동기화 중...'}
            {HAS_SUPABASE && syncStatus==='err' && '⚠️ DB 연결 실패'}
          </div>
          <button onClick={resetAll} className="inline-flex items-center gap-1.5 text-xs text-stone-400 hover:text-rose-500">
            <Reset className="w-3 h-3" />체크 기록 초기화
          </button>
        </div>
      </main>

      {editing && <CourseForm course={editing} onSave={saveCourse} onClose={()=>setEditing(null)} holidays={config.holidays} config={config} today={today} />}
      {quickEdit && <QuickEdit task={quickEdit} cur={getVal(checked[quickEdit.id])} onSet={v=>setVal(quickEdit.id,v, quickEdit._fromMissed)} onClose={()=>setQuickEdit(null)} />}
    </div>
  );
}

// ========== 🏆 달성 달력 (성취감 대시보드) ==========
function Achievement({ courses, checked, config, today, schedule }) {
  // 각 날짜별 달성량 집계 (ca = 실제 완료일 기준)
  // ❗ 모든 태스크를 "1개 = 1"로 정규화해서 집계
  const achievements = useMemo(() => {
    const byDate = {};
    const allDates = daysBtw(config.startDate, config.endDate);
    
    // 1. 각 예정 날짜의 총 목표 = 태스크 개수
    for (const ds of allDates) {
      const day = schedule[ds];
      if (!day) continue;
      byDate[ds] = { total: 0, done: 0, doneOnDate: 0, tasks: [] };
      for (const t of day.tasks) {
        if (t.courseId === 'exam') continue;
        byDate[ds].total += 1; // 태스크 하나 = 목표 1
        byDate[ds].tasks.push(t);
      }
    }
    
    // 2. 체크된 것들을 정규화해서 기록
    for (const [tid, v] of Object.entries(checked)) {
      const val = getVal(v);
      const ca = getCA(v);
      if (val <= 0) continue;
      
      const [cid, td] = tid.split(':');
      if (cid === 'exam') continue;
      
      let taskTarget = 1;
      if (schedule[td]) {
        const t = schedule[td].tasks.find(x => x.id === tid);
        if (t) taskTarget = t.target;
      }
      // 0~1 사이의 정규화된 달성도
      const doneAmount = normDone(val, taskTarget);
      
      // 예정일의 done 증가 (할당량 대비 달성률)
      if (byDate[td]) {
        byDate[td].done += doneAmount;
      }
      
      // 실제 완료일 기록 (만회한 날 집계용)
      if (ca && ca !== td && byDate[ca]) {
        byDate[ca].doneOnDate += doneAmount;
      } else if (byDate[td]) {
        byDate[td].doneOnDate += doneAmount;
      }
    }
    
    return byDate;
  }, [checked, schedule, config]);

  // 달성 강도 (0~4): GitHub 잔디밭 스타일
  const getIntensity = (ds) => {
    const d = achievements[ds];
    if (!d || d.doneOnDate < 0.1) return 0;
    // 달성한 태스크 개수 기준
    if (d.doneOnDate < 2) return 1;
    if (d.doneOnDate < 4) return 2;
    if (d.doneOnDate < 6) return 3;
    return 4;
  };

  // 전체 통계
  const overallStats = useMemo(() => {
    let totalDone = 0, totalTarget = 0, perfectDays = 0, studyDays = 0, streakCur = 0, streakBest = 0;
    const today_date = pd(today);
    const allDatesArr = daysBtw(config.startDate, today).filter(d => pd(d) <= today_date);
    
    let currentStreak = 0;
    for (let i = allDatesArr.length - 1; i >= 0; i--) {
      const ds = allDatesArr[i];
      const d = achievements[ds];
      if (!d) continue;
      if (d.total === 0) continue;
      studyDays++;
      totalDone += d.done;
      totalTarget += d.total;
      if (d.done >= d.total - 0.001) perfectDays++;
      
      if (d.doneOnDate > 0.001 || d.done >= d.total - 0.001) {
        currentStreak++;
        streakBest = Math.max(streakBest, currentStreak);
      } else {
        if (i === allDatesArr.length - 1) {
          // 오늘 아직 안 했으면 스트릭 유지
        } else {
          currentStreak = 0;
        }
      }
    }
    
    // 현재 스트릭 다시 계산 (오늘부터 역순)
    let s = 0;
    for (let i = allDatesArr.length - 1; i >= 0; i--) {
      const ds = allDatesArr[i];
      const d = achievements[ds];
      if (!d || d.total === 0) continue;
      if (d.done >= d.total - 0.001 || d.doneOnDate > 0.001) {
        s++;
      } else {
        if (i === allDatesArr.length - 1) continue;
        break;
      }
    }
    streakCur = s;
    
    return { totalDone, totalTarget, perfectDays, studyDays, streakCur, streakBest };
  }, [achievements, today, config]);

  // 과목별 누적 통계
  const subjectTotals = useMemo(() => {
    const m = {};
    for (const [tid, v] of Object.entries(checked)) {
      const val = getVal(v);
      if (val <= 0) continue;
      const [cid, td] = tid.split(':');
      const course = courses.find(c => c.id === cid);
      if (!course) continue;
      if (!m[course.subject]) m[course.subject] = 0;
      m[course.subject] += val;
    }
    return m;
  }, [checked, courses]);

  // 달력 렌더
  const allDates = daysBtw(config.startDate, config.endDate);
  const startDow = pd(config.startDate).getDay();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (const ds of allDates) cells.push(ds);
  
  // 주별로 그룹
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) {
    weeks.push(cells.slice(i, i + 7));
  }
  
  const DOW = ['일','월','화','수','목','금','토'];
  
  const today_date = pd(today);
  const startDate = pd(config.startDate);
  const daysSinceStart = Math.max(1, Math.min(Math.floor((today_date - startDate) / 86400000) + 1, allDates.length));
  const pct = overallStats.totalTarget ? Math.round(overallStats.totalDone/overallStats.totalTarget*100) : 0;

  return (
    <>
      {/* 상단 트로피 카드 */}
      <div className="relative overflow-hidden bg-gradient-to-br from-amber-500 via-orange-500 to-rose-500 rounded-2xl p-5 text-white shadow-lg mb-4">
        <div className="absolute top-0 right-0 opacity-10">
          <Trophy className="w-32 h-32" />
        </div>
        <div className="relative">
          <div className="flex items-center gap-2 mb-1">
            <Trophy className="w-5 h-5" />
            <h2 className="text-sm font-bold uppercase tracking-wider">Your Journey</h2>
          </div>
          <div className="text-4xl font-black tabular-nums mb-1">{pct}%</div>
          <div className="text-xs opacity-90 tabular-nums">
            {Math.round(overallStats.totalDone)} / {overallStats.totalTarget} 과업 완료 · {daysSinceStart}일차
          </div>
        </div>
      </div>

      {/* 주요 통계 3개 */}
      <div className="grid grid-cols-3 gap-2 mb-5">
        <StatCard 
          icon={<Flame className="w-4 h-4" />} 
          label="현재 연속" 
          value={overallStats.streakCur} 
          unit="일" 
          color="bg-gradient-to-br from-rose-500 to-orange-500"
        />
        <StatCard 
          icon={<Award className="w-4 h-4" />} 
          label="최장 연속" 
          value={overallStats.streakBest} 
          unit="일" 
          color="bg-gradient-to-br from-amber-500 to-yellow-500"
        />
        <StatCard 
          icon={<Check className="w-4 h-4" />} 
          label="완벽한 날" 
          value={overallStats.perfectDays} 
          unit="일" 
          color="bg-gradient-to-br from-emerald-500 to-teal-500"
        />
      </div>

      {/* 히트맵 (GitHub 잔디밭 스타일) */}
      <section className="bg-white rounded-2xl border border-stone-200 shadow-sm p-4 mb-4">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h3 className="text-sm font-bold text-stone-800">📅 달성 히트맵</h3>
            <p className="text-[10px] text-stone-500 mt-0.5">진하게 물든 날 = 많이 해낸 날</p>
          </div>
          <div className="flex items-center gap-1">
            <span className="text-[9px] text-stone-400">적음</span>
            {[0,1,2,3,4].map(i => (
              <div key={i} className={`w-2.5 h-2.5 rounded-sm ${
                i === 0 ? 'bg-stone-100' :
                i === 1 ? 'bg-emerald-200' :
                i === 2 ? 'bg-emerald-400' :
                i === 3 ? 'bg-emerald-600' : 'bg-emerald-800'
              }`}></div>
            ))}
            <span className="text-[9px] text-stone-400">많음</span>
          </div>
        </div>
        
        <div className="overflow-x-auto -mx-2 px-2">
          <div className="inline-flex gap-0.5 pb-1">
            {/* 요일 라벨 */}
            <div className="flex flex-col gap-0.5 pr-1 pt-3">
              {DOW.map((d, i) => (
                <div key={d} className="w-3 h-3 flex items-center justify-center text-[8px] text-stone-400">
                  {i % 2 === 1 ? d : ''}
                </div>
              ))}
            </div>
            {/* 주별 셀 */}
            {weeks.map((week, wi) => {
              // 첫날 라벨용
              const firstDs = week.find(d => d);
              const showMonth = firstDs && (wi === 0 || (week[0] && Number(week[0].slice(8)) <= 7));
              return (
                <div key={wi} className="flex flex-col gap-0.5">
                  <div className="h-2.5 text-[8px] text-stone-400 tabular-nums">
                    {showMonth && firstDs ? `${Number(firstDs.slice(5,7))}월` : ''}
                  </div>
                  {DOW.map((_, di) => {
                    const ds = week[di];
                    if (!ds) return <div key={di} className="w-3 h-3"></div>;
                    const intensity = getIntensity(ds);
                    const isToday = ds === today;
                    const isFuture = pd(ds) > today_date;
                    const isHoliday = config.holidays.includes(ds);
                    const a = achievements[ds];
                    
                    let bg = 'bg-stone-100';
                    if (isFuture) bg = 'bg-stone-50';
                    else if (isHoliday) bg = 'bg-amber-100';
                    else if (intensity === 1) bg = 'bg-emerald-200';
                    else if (intensity === 2) bg = 'bg-emerald-400';
                    else if (intensity === 3) bg = 'bg-emerald-600';
                    else if (intensity === 4) bg = 'bg-emerald-800';
                    
                    return (
                      <div key={di} 
                        className={`heat-cell w-3 h-3 rounded-sm ${bg} ${isToday ? 'ring-2 ring-rose-400 ring-offset-1' : ''}`}
                        title={`${ds}${a ? ` · ${a.doneOnDate}개 달성` : ''}`}
                      />
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </section>

      {/* 월별 달력 - 만회 흔적 보이게 */}
      <MonthCalendar achievements={achievements} config={config} today={today} checked={checked} courses={courses} schedule={schedule} />

      {/* 과목별 누적 */}
      {Object.keys(subjectTotals).length > 0 && (
        <section className="mt-4 bg-white rounded-2xl border border-stone-200 shadow-sm p-4">
          <h3 className="text-sm font-bold text-stone-800 mb-3">🎯 과목별 누적 달성</h3>
          <div className="space-y-2">
            {Object.entries(subjectTotals).sort((a,b) => b[1] - a[1]).map(([sub, cnt]) => {
              const cfg = getSub(sub);
              return (
                <div key={sub} className="flex items-center gap-2">
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${cfg.ch} w-20 text-center`}>{sub}</span>
                  <div className="flex-1 h-6 bg-stone-100 rounded-md overflow-hidden relative">
                    <div className={`h-full ${cfg.br} transition-all duration-500`} style={{width: `${Math.min(100, cnt / (Math.max(...Object.values(subjectTotals)) || 1) * 100)}%`}} />
                    <span className="absolute inset-0 flex items-center justify-end pr-2 text-xs font-bold tabular-nums text-stone-700">
                      {cnt}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* 동기부여 문구 */}
      <div className="mt-5 text-center">
        {pct >= 80 ? (
          <div className="text-base font-bold text-rose-600">🔥 미쳤다 이 페이스! 6모 조져버리자</div>
        ) : pct >= 50 ? (
          <div className="text-base font-bold text-amber-600">💪 절반 넘었다! 계속 가자</div>
        ) : pct >= 20 ? (
          <div className="text-base font-bold text-emerald-600">🌱 뿌리 내리는 중 · 꾸준히 가자</div>
        ) : (
          <div className="text-base font-bold text-stone-600">🎯 시작이 반! 한 걸음씩 ㄱㄱ</div>
        )}
      </div>
    </>
  );
}

// 통계 카드
function StatCard({ icon, label, value, unit, color }) {
  return (
    <div className={`${color} rounded-xl p-3 text-white shadow-sm`}>
      <div className="flex items-center gap-1 mb-1 opacity-90">
        {icon}
        <span className="text-[10px] font-bold uppercase tracking-wider">{label}</span>
      </div>
      <div className="flex items-baseline gap-1">
        <span className="text-2xl font-black tabular-nums">{value}</span>
        <span className="text-xs opacity-80">{unit}</span>
      </div>
    </div>
  );
}

// 월별 달력 (만회 표시 포함)
function MonthCalendar({ achievements, config, today, checked, courses, schedule }) {
  const [viewMonth, setViewMonth] = useState(() => {
    const d = pd(today);
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [selectedDate, setSelectedDate] = useState(null);
  
  const monthStart = new Date(viewMonth.y, viewMonth.m, 1);
  const monthEnd = new Date(viewMonth.y, viewMonth.m + 1, 0);
  const startDOW = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  
  const cells = [];
  for (let i = 0; i < startDOW; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  
  const DOW = ['일','월','화','수','목','금','토'];
  const today_date = pd(today);
  
  return (
    <section className="bg-white rounded-2xl border border-stone-200 shadow-sm p-4">
      <div className="flex items-center justify-between mb-3">
        <div>
          <h3 className="text-sm font-bold text-stone-800">🗓️ 월별 달성</h3>
          <p className="text-[10px] text-stone-500 mt-0.5">날짜 탭하면 상세 보이기</p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setViewMonth(v => {
            const d = new Date(v.y, v.m - 1, 1);
            return { y: d.getFullYear(), m: d.getMonth() };
          })} className="p-1 hover:bg-stone-100 rounded">
            <ChevronLeft className="w-4 h-4" />
          </button>
          <div className="text-xs font-bold tabular-nums">{viewMonth.y}.{String(viewMonth.m + 1).padStart(2,'0')}</div>
          <button onClick={() => setViewMonth(v => {
            const d = new Date(v.y, v.m + 1, 1);
            return { y: d.getFullYear(), m: d.getMonth() };
          })} className="p-1 hover:bg-stone-100 rounded">
            <ChevronRight className="w-4 h-4" />
          </button>
        </div>
      </div>
      
      <div className="grid grid-cols-7 gap-1 mb-2">
        {DOW.map((d, i) => (
          <div key={d} className={`text-center text-[10px] font-bold py-1 ${i===0?'text-rose-500':i===6?'text-sky-500':'text-stone-500'}`}>
            {d}
          </div>
        ))}
      </div>
      
      <div className="grid grid-cols-7 gap-1">
        {cells.map((day, i) => {
          if (day === null) return <div key={`e${i}`} className="aspect-square"></div>;
          const ds = fd(new Date(viewMonth.y, viewMonth.m, day));
          const a = achievements[ds];
          const isToday = ds === today;
          const isFuture = pd(ds) > today_date;
          const isHoliday = config.holidays.includes(ds);
          const hasData = a && a.total > 0;
          const perfect = hasData && a.done >= a.total - 0.001;
          const pct = hasData ? Math.round(a.done/a.total*100) : 0;
          const hasMakeup = a && a.doneOnDate > (hasData ? a.total : 0.001) + 0.001;
          const dowIdx = new Date(viewMonth.y, viewMonth.m, day).getDay();
          const clickable = !isFuture; // 미래 날짜는 클릭 안 됨
          
          return (
            <button key={ds} 
              onClick={() => clickable && setSelectedDate(ds)}
              disabled={!clickable}
              className={`aspect-square rounded-lg border relative flex flex-col items-center justify-center text-xs transition-colors
              ${isToday ? 'ring-2 ring-rose-400 border-rose-300' : 'border-stone-200'}
              ${isHoliday ? 'bg-amber-50' : 
                isFuture ? 'bg-stone-50' :
                perfect ? 'bg-emerald-100 hover:bg-emerald-200' :
                pct >= 50 ? 'bg-emerald-50 hover:bg-emerald-100' :
                pct > 0 ? 'bg-amber-50 hover:bg-amber-100' :
                hasData ? 'bg-stone-50 hover:bg-stone-100' : 'bg-white hover:bg-stone-50'}
              ${!clickable ? 'cursor-default' : 'cursor-pointer'}
            `}>
              <div className={`font-semibold tabular-nums ${
                dowIdx === 0 ? 'text-rose-600' : 
                dowIdx === 6 ? 'text-sky-600' : 
                'text-stone-700'
              } ${isFuture ? 'opacity-40' : ''}`}>
                {day}
              </div>
              {hasData && !isFuture && (
                <div className="text-[8px] tabular-nums font-bold">
                  {perfect ? '✓' : pct > 0 ? `${pct}%` : ''}
                </div>
              )}
              {hasMakeup && !isFuture && (
                <div className="absolute -top-0.5 -right-0.5 text-[8px]">🔥</div>
              )}
              {isHoliday && <div className="absolute top-0.5 right-0.5 text-[8px]">🏖</div>}
            </button>
          );
        })}
      </div>
      
      <div className="mt-3 flex items-center justify-center gap-3 text-[10px] text-stone-500">
        <span className="flex items-center gap-1"><div className="w-3 h-3 bg-emerald-100 rounded"></div>완료</span>
        <span className="flex items-center gap-1"><div className="w-3 h-3 bg-emerald-50 rounded"></div>50%+</span>
        <span className="flex items-center gap-1"><div className="w-3 h-3 bg-amber-50 rounded"></div>일부</span>
        <span className="flex items-center gap-1">🔥 만회</span>
      </div>
      
      {selectedDate && <DayDetailModal 
        date={selectedDate} 
        onClose={() => setSelectedDate(null)}
        checked={checked}
        courses={courses}
        schedule={schedule}
        config={config}
      />}
    </section>
  );
}

// ========== 날짜 상세 모달 ==========
function DayDetailModal({ date, onClose, checked, courses, schedule, config }) {
  const day = schedule[date];
  const isHoliday = config.holidays.includes(date);
  const wd = dowN(date);
  
  // 이 날짜의 모든 예정 태스크
  const scheduledTasks = day ? day.tasks.filter(t => t.courseId !== 'exam') : [];
  
  // 예정 태스크별 달성도
  const scheduledResults = scheduledTasks.map(t => {
    const v = getVal(checked[t.id]);
    const ca = getCA(checked[t.id]);
    return {
      ...t,
      achieved: v,
      completedAt: ca, // 실제 완료일
      status: v >= t.target ? 'done' : v > 0 ? 'partial' : 'missed',
      doneOnDate: !ca || ca === date, // 예정일에 완료했는지
    };
  });
  
  // 이 날짜에 "실제로" 완료된 모든 태스크 (다른 날 예정이었다가 이 날 만회한 것 포함)
  const completedOnThisDate = [];
  for (const [tid, v] of Object.entries(checked)) {
    const val = getVal(v);
    const ca = getCA(v);
    if (val <= 0) continue;
    const [cid, td] = tid.split(':');
    if (cid === 'exam') continue;
    
    // 이 날짜가 실제 완료일인 경우
    if (ca === date && td !== date) {
      // 다른 날 예정이었는데 이 날 완료한 것
      const course = courses.find(c => c.id === cid);
      if (!course) continue;
      
      // 해당 task 정보 찾기
      let taskText = course.name;
      let taskTarget = 1;
      let taskUnit = course.unit || '';
      if (schedule[td]) {
        const origTask = schedule[td].tasks.find(x => x.id === tid);
        if (origTask) {
          taskText = origTask.text;
          taskTarget = origTask.target;
          taskUnit = origTask.unit;
        }
      }
      
      completedOnThisDate.push({
        id: tid,
        courseId: cid,
        subject: course.subject,
        text: taskText,
        target: taskTarget,
        unit: taskUnit,
        achieved: val,
        originalDate: td, // 원래 예정일
        type: course.type,
      });
    }
  }
  
  const totalTarget = scheduledTasks.length; // 태스크 개수 기준
  const totalDone = scheduledTasks.reduce((s,t) => s + normDone(getVal(checked[t.id]), t.target), 0);
  const pct = totalTarget > 0 ? Math.round(totalDone / totalTarget * 100) : 0;
  
  const dateLabel = `${Number(date.slice(5,7))}월 ${Number(date.slice(8))}일 (${wd})`;
  
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in" onClick={onClose}>
      <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl max-h-[85vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        {/* 헤더 */}
        <div className="sticky top-0 bg-white border-b border-stone-200 px-4 py-3 flex items-center justify-between z-10">
          <div>
            <h3 className="text-base font-bold">{dateLabel}</h3>
            <div className="text-[11px] text-stone-500 tabular-nums">{date}</div>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded-lg"><X className="w-5 h-5" /></button>
        </div>
        
        <div className="p-4 space-y-4">
          {/* 휴일 */}
          {isHoliday && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-center">
              <div className="text-3xl mb-1">🏖️</div>
              <div className="text-sm font-bold text-amber-800">휴일 · 전면 휴식</div>
            </div>
          )}
          
          {/* 달성률 요약 */}
          {!isHoliday && totalTarget > 0 && (
            <div className={`rounded-2xl p-4 ${
              pct === 100 ? 'bg-gradient-to-br from-emerald-500 to-teal-500 text-white' :
              pct >= 50 ? 'bg-gradient-to-br from-amber-400 to-orange-400 text-white' :
              pct > 0 ? 'bg-amber-50 border border-amber-200' :
              'bg-stone-100'
            }`}>
              <div className="flex items-baseline gap-2">
                <div className="text-4xl font-black tabular-nums">{pct}%</div>
                <div className="text-xs opacity-90 tabular-nums">
                  {Math.round(totalDone * 10) / 10} / {totalTarget} 달성
                </div>
              </div>
              <div className={`text-[11px] mt-1 ${pct >= 50 ? 'opacity-90' : 'text-stone-500'}`}>
                {pct === 100 ? '🔥 완벽한 하루' :
                 pct >= 80 ? '💪 거의 다 했음' :
                 pct >= 50 ? '👍 절반 넘김' :
                 pct > 0 ? '🌱 시작은 했어' :
                 '😴 기록 없음'}
              </div>
            </div>
          )}
          
          {/* 예정된 과제 */}
          {scheduledTasks.length > 0 && (
            <div>
              <div className="flex items-center gap-1.5 mb-2">
                <Book className="w-4 h-4 text-stone-600" />
                <h4 className="text-xs font-bold text-stone-700">이 날 예정된 과제 ({scheduledTasks.length}개)</h4>
              </div>
              <div className="space-y-1.5">
                {scheduledResults.map(t => {
                  const cfg = getSub(t.subject);
                  return (
                    <div key={t.id} className={`flex items-center gap-2 p-2.5 rounded-lg border ${
                      t.status === 'done' ? 'bg-emerald-50 border-emerald-200' :
                      t.status === 'partial' ? 'bg-amber-50 border-amber-200' :
                      'bg-stone-50 border-stone-200'
                    }`}>
                      <div className={`w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0 ${
                        t.status === 'done' ? 'bg-emerald-500' :
                        t.status === 'partial' ? 'bg-amber-400' :
                        'bg-stone-300'
                      }`}>
                        {t.status === 'done' && <Check className="w-3 h-3 text-white" />}
                        {t.status === 'partial' && <div className="w-2 h-2 bg-white rounded-sm" />}
                        {t.status === 'missed' && <X className="w-3 h-3 text-white" />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1 flex-wrap">
                          <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${cfg.ch}`}>{t.subject}</span>
                          {!t.doneOnDate && t.achieved > 0 && (
                            <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-purple-100 text-purple-700 tabular-nums">
                              {Number(t.completedAt.slice(5,7))}/{Number(t.completedAt.slice(8))} 만회완료
                            </span>
                          )}
                        </div>
                        <div className={`text-xs font-semibold ${t.status === 'missed' ? 'text-stone-500' : 'text-stone-800'}`}>
                          {t.text}
                        </div>
                      </div>
                      <div className="text-[10px] tabular-nums font-mono font-bold flex-shrink-0">
                        <span className={
                          t.status === 'done' ? 'text-emerald-700' :
                          t.status === 'partial' ? 'text-amber-700' :
                          'text-stone-400'
                        }>{t.achieved}</span>
                        <span className="text-stone-400">/{t.target}{t.unit}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          
          {/* 이 날 만회한 것 (다른 날 예정이었다가 이 날 완료) */}
          {completedOnThisDate.length > 0 && (
            <div>
              <div className="flex items-center gap-1.5 mb-2">
                <span className="text-sm">🔥</span>
                <h4 className="text-xs font-bold text-amber-800">이 날 만회한 과제 ({completedOnThisDate.length}개)</h4>
              </div>
              <div className="space-y-1.5">
                {completedOnThisDate.map(t => {
                  const cfg = getSub(t.subject);
                  return (
                    <div key={t.id} className="flex items-center gap-2 p-2.5 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="w-5 h-5 rounded-md bg-purple-500 flex items-center justify-center flex-shrink-0">
                        <Check className="w-3 h-3 text-white" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1 flex-wrap">
                          <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${cfg.ch}`}>{t.subject}</span>
                          <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-stone-200 text-stone-700 tabular-nums">

                    </div>
                  );
                })}
              </div>
            </div>
          )}
          
          {/* 아무것도 없을 때 */}
          {!isHoliday && scheduledTasks.length === 0 && completedOnThisDate.length === 0 && (
            <div className="text-center py-8 text-stone-400">
              <div className="text-3xl mb-2">😴</div>
              <div className="text-sm">이 날은 예정된 과제 없음</div>

          <button onClick={onClose} className="w-full py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg text-sm font-bold">닫기</button>
        </div>
      </div>
    </div>
  );
}

// ========== DayCard ==========
function DayCard({ ds, schedule, today, checked, missed, showMissed, onToggle, onAdjust, onQuickEdit, popTaskId }) {
  const d = schedule[ds];
  if (!d) return null;
  const isT = ds === today;
  const isW = d.wd === '토' || d.wd === '일';
  const isE = d.isExam;
  // 하루치 진도 (태스크 개수 기준, 분량형은 비율로)
  const dt = d.tasks.length;
  const dd = d.tasks.reduce((s,t) => s + normDone(getVal(checked[t.id]), t.target), 0);
  const all = dt > 0 && dd >= dt - 0.001; // 부동소수 오차 방지

  return (
    <div className={`bg-white rounded-2xl border shadow-sm overflow-hidden ${isT?'border-rose-400 ring-2 ring-rose-200':'border-stone-200'} ${isE?'bg-gradient-to-br from-rose-50 via-white to-amber-50':''}`}>
      <div className={`px-4 py-3 flex items-center justify-between ${isT?'bg-rose-500 text-white':isW?'bg-stone-100':'bg-stone-50'} ${isE?'!bg-gradient-to-r !from-rose-600 !to-red-500 !text-white':''}`}>
        <div className="flex items-center gap-2">
          <div className={`w-9 h-9 rounded-lg flex flex-col items-center justify-center font-bold ${isT||isE?'bg-white/20 text-white':'bg-white text-stone-700 border border-stone-200'}`}>
            <div className="text-[9px] leading-none">{d.wd}</div>
            <div className="text-sm leading-none mt-0.5 tabular-nums">{Number(ds.slice(8))}</div>
          </div>
          <div>
            <div className={`text-xs font-semibold tabular-nums ${isT||isE?'text-white/90':'text-stone-500'}`}>{Number(ds.slice(5,7))}월 {Number(ds.slice(8))}일</div>
            {d.special && <div className={`text-[11px] font-bold mt-0.5 ${isT||isE?'text-amber-200':'text-rose-600'}`}>{d.special}</div>}
          </div>
        </div>
        <div className="text-right">
          {isT && <div className="text-[10px] font-black text-amber-200 tracking-widest">TODAY</div>}
          {dt > 0 && (
            <div className={`text-xs tabular-nums font-mono ${isT||isE?'text-white/80':'text-stone-500'}`}>
              {Math.round(dd)}/{dt} {all && '✓'}
            </div>
          )}
        </div>
      </div>
      <div className="p-3 space-y-2">
        {d.tasks.map(t => <Task key={t.id} t={t} v={getVal(checked[t.id])} onT={()=>onToggle(t)} onA={d=>onAdjust(t,d)} onE={()=>onQuickEdit(t)} pop={popTaskId===t.id} />)}
        
        {showMissed && missed.length > 0 && (
          <div className="mt-3 pt-3 border-t-2 border-dashed border-amber-300">
            <div className="flex items-center gap-1.5 mb-2">
              <Warn className="w-4 h-4 text-amber-600" />
              <span className="text-xs font-bold text-amber-800">
                밀린 과제 · 남는 시간에 만회 ({missed.length}개)
              </span>
            </div>
            <div className="space-y-2">
              {missed.map(t => <Task key={`m-${t.id}`} t={t} v={getVal(checked[t.id])} onT={()=>onToggle(t, true)} onA={d=>onAdjust(t,d, true)} onE={()=>onQuickEdit({...t, _fromMissed: true})} isMissed od={t.originalDate} pop={popTaskId===t.id} />)}
            </div>
          </div>
        )}
        
        {d.tasks.length === 0 && !showMissed && (
          <div className="text-center text-stone-400 py-8 text-sm">
            <div className="text-2xl mb-1">{d.isHoliday?'🏖️':'😴'}</div>
            <div>{d.isHoliday?'휴일이야 · 진짜 쉬어':'쉬는 날'}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ========== Task ==========
function Task({ t, v, onT, onA, onE, pop, isMissed, od }) {
  const cfg = getSub(t.subject);
  const tgt = t.target;
  const isQ = (t.type === 'quota' || t.type === 'lesson') && tgt > 1;
  const done = v >= tgt, partial = v > 0 && v < tgt, over = v > tgt;
  const step = tgt >= 100 ? 10 : tgt >= 20 ? 5 : 1;

  return (
    <div className={`flex items-start gap-2 p-3 rounded-xl ${done?'bg-stone-50 border border-stone-200':`${cfg.bg} border ${cfg.bd}`} ${isMissed&&!done?'ring-1 ring-amber-300':''}`}>
      <button onClick={onT} className={`flex-shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center mt-0.5 ${done?'bg-emerald-500 border-emerald-500':partial?'bg-amber-100 border-amber-400':`bg-white ${cfg.bd.replace('-200','-400')}`} ${pop?'check-pop':''}`}>
        {done && <Check className="w-4 h-4 text-white" />}
        {partial && !done && <div className="w-2.5 h-2.5 bg-amber-500 rounded-sm" />}
      </button>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${cfg.ch}`}>{t.subject}</span>
          {isMissed && od && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-200 text-amber-900 tabular-nums">{Number(od.slice(5,7))}/{Number(od.slice(8))} 놓침</span>}
          {over && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-purple-100 text-purple-700">🔥 초과</span>}
        </div>
        <div className={`text-sm font-semibold ${done&&!over?'text-stone-400 line-through':'text-stone-800'}`}>
          {t.text}
          {isQ && <span className="ml-1 text-stone-500 font-normal">{tgt}{t.unit}</span>}
        </div>
        {t.note && <div className={`text-xs mt-0.5 ${done&&!over?'text-stone-300':'text-stone-500'}`}>{t.note}</div>}
        {isQ && (
          <div className="mt-2 flex items-center gap-2">
            <button onClick={()=>onA(-step)} disabled={v<=0} className="w-7 h-7 flex items-center justify-center bg-white border border-stone-300 rounded-md hover:bg-stone-100 disabled:opacity-30">
              <Minus className="w-3.5 h-3.5" />
            </button>
            <button onClick={onE} className="flex-1 min-w-0 text-center tabular-nums font-mono font-bold text-sm py-1.5 rounded-md bg-white border border-stone-300 hover:bg-stone-100">
              <span className={over?'text-purple-700':partial?'text-amber-700':done?'text-emerald-700':'text-stone-700'}>{v}</span>
              <span className="text-stone-400"> / {tgt}{t.unit}</span>
            </button>
            <button onClick={()=>onA(step)} className="w-7 h-7 flex items-center justify-center bg-white border border-stone-300 rounded-md hover:bg-stone-100">
              <Plus className="w-3.5 h-3.5" />
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ========== QuickEdit ==========
function QuickEdit({ task, cur, onSet, onClose }) {
  const [inp, setInp] = useState(String(cur));
  const cfg = getSub(task.subject);
  const save = () => { const n = parseInt(inp,10); if (!isNaN(n)) onSet(n); onClose(); };
  const qv = [0, Math.floor(task.target/2), task.target, task.target + Math.floor(task.target*0.3)];

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
      <div className="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-3xl shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="px-4 py-3 border-b border-stone-200 flex items-center justify-between">
          <h3 className="text-base font-bold">몇 개 했어?</h3>
          <button onClick={onClose} className="p-1.5 hover:bg-stone-100 rounded-lg"><X className="w-5 h-5" /></button>
        </div>
        <div className="p-4 space-y-4">
          <div className={`${cfg.bg} ${cfg.bd} border rounded-xl p-3`}>
            <div className={`text-[10px] font-bold ${cfg.c} mb-0.5`}>{task.subject}</div>
            <div className="text-sm font-bold">{task.text}</div>
            <div className="text-xs text-stone-500 mt-0.5">목표: {task.target}{task.unit}</div>
          </div>
          <div>
            <input type="number" value={inp} onChange={e=>setInp(e.target.value)} onFocus={e=>e.target.select()} autoFocus
              className="w-full px-4 py-4 text-3xl font-black text-center tabular-nums bg-stone-50 border-2 border-stone-200 rounded-xl focus:outline-none focus:border-rose-400" />
            <div className="text-center text-stone-500 text-sm mt-1 tabular-nums">/ {task.target}{task.unit}</div>
          </div>
          <div>
            <div className="text-[11px] text-stone-500 font-bold mb-1.5 tracking-wide">빠른 선택</div>
            <div className="grid grid-cols-4 gap-1.5">
              {qv.map((v,i) => (
                <button key={i} onClick={()=>setInp(String(v))}
                  className={`py-2 rounded-lg text-sm font-bold tabular-nums ${Number(inp)===v?'bg-rose-500 text-white':'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>{v}</button>
              ))}
            </div>
          </div>
        </div>
        <div className="border-t border-stone-200 p-3 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg text-sm font-bold">취소</button>
          <button onClick={save} className="flex-[2] py-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-sm font-bold">저장</button>
        </div>
      </div>
    </div>
  );
}

            <div className="grid grid-cols-4 gap-1.5">
              {SUB_LIST.map(s => {
                const sc = getSub(s), a = f.subject === s;
                return <button key={s} onClick={()=>up({subject:s})}
                  className={`py-2 rounded-lg text-xs font-semibold ${a?`${sc.ch} ring-2 ring-offset-1 ring-stone-800`:'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>{s}</button>;
              })}
            </div>
          </Row>
          <Row label="타입">
            <div className="grid grid-cols-3 gap-1.5">
              <button onClick={()=>up({type:'lesson'})} className={`p-2.5 rounded-xl border-2 text-left ${f.type==='lesson'?'bg-rose-50 border-rose-400':'bg-white border-stone-200'}`}>
                <div className={`flex items-center gap-1 mb-0.5 ${f.type==='lesson'?'text-rose-700':'text-stone-600'}`}><Book className="w-3.5 h-3.5" /><span className="text-xs font-bold">진도형</span></div>
                <div className="text-[9px] text-stone-500">총 N강 중 1강씩</div>
              </button>
              <button onClick={()=>up({type:'quota'})} className={`p-2.5 rounded-xl border-2 text-left ${f.type==='quota'?'bg-rose-50 border-rose-400':'bg-white border-stone-200'}`}>
                <div className={`flex items-center gap-1 mb-0.5 ${f.type==='quota'?'text-rose-700':'text-stone-600'}`}><Spark className="w-3.5 h-3.5" /><span className="text-xs font-bold">분량형</span></div>
                <div className="text-[9px] text-stone-500">하루 N개씩</div>
              </button>
              <button onClick={()=>up({type:'custom'})} className={`p-2.5 rounded-xl border-2 text-left ${f.type==='custom'?'bg-rose-50 border-rose-400':'bg-white border-stone-200'}`}>
                <div className={`flex items-center gap-1 mb-0.5 ${f.type==='custom'?'text-rose-700':'text-stone-600'}`}><Cal className="w-3.5 h-3.5" /><span className="text-xs font-bold">단발형</span></div>
                <div className="text-[9px] text-stone-500">원하는 날짜만</div>
              </button>
            </div>
          </Row>
          {f.type==='lesson' && (
            <>
              <div className="grid grid-cols-2 gap-2">
                <Row label="총 분량" req>
                  <div className="flex gap-1">
                    <input type="number" min="1" value={f.totalLessons||''} onChange={e=>up({totalLessons:Number(e.target.value)})}
                      className="flex-1 px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                    <input type="text" value={f.unit||'강'} onChange={e=>up({unit:e.target.value})}
                      className="w-14 px-2 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm text-center" />
                  </div>
                </Row>
                <Row label="이미 한 분량">
                  <input type="number" min="0" value={f.doneLessons||0} onChange={e=>up({doneLessons:Number(e.target.value)})}
                    className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                </Row>
              </div>
              <Row label={`하루 ${f.unit||'강'} 수`}>
                <input type="number" min="1" value={f.dailyAmount||1} onChange={e=>up({dailyAmount:Math.max(1, Number(e.target.value))})}
                  className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                <div className="text-[10px] text-stone-500 mt-1">기본 1{f.unit||'강'}, 빨리 끝내고 싶으면 2~3 추천</div>
              </Row>
              <Row label="완강 목표일" req>
                <input type="date" value={f.targetDate||''} onChange={e=>up({targetDate:e.target.value})}
                  className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm" />
              </Row>
              <Row label="완강 후 할 일 (선택)">
                <input type="text" value={f.postCompleteText||''} onChange={e=>up({postCompleteText:e.target.value})} placeholder="예: 기출 1회"
                  className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm" />
              </Row>
            </>
          )}
          {f.type==='quota' && (
            <Row label="하루 분량" req>
              <div className="flex gap-1">
                <input type="number" min="1" value={f.dailyAmount||''} onChange={e=>up({dailyAmount:Number(e.target.value)})}
                  className="flex-1 px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm tabular-nums" />
                <input type="text" value={f.unit||'개'} onChange={e=>up({unit:e.target.value})}
                  className="w-14 px-2 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm text-center" />
              </div>
            </Row>
          )}
          
          {f.type==='custom' && (
            <Row label="실행 날짜 선택" req>
              <DatePicker 
                startDate={config.startDate} 
                endDate={config.endDate} 
                holidays={holidays}
                selected={f.customDates || []} 
                onToggle={toggleCustomDate} 
              />
              <div className="mt-2 text-[11px] text-stone-500">
                선택됨: <b className="tabular-nums">{(f.customDates||[]).length}개 날짜</b>
                {(f.customDates||[]).length > 0 && (
                  <span> · {(f.customDates||[]).sort().map(d => d.slice(5).replace('-','/')).join(', ')}</span>
                )}
              </div>
            </Row>
          )}
          
          {f.type!=='custom' && (
            <Row label="배치 요일" req>
              <div className="grid grid-cols-7 gap-1">
                {DOW.map((n, d) => (
                  <button key={d} onClick={()=>tD(d)} className={`py-2.5 rounded-lg text-xs font-bold ${f.days?.includes(d)?'bg-rose-500 text-white':'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>{n}</button>
                ))}
              </div>
            </Row>
          )}
          
          <Row label="메모 (선택)">
            <input type="text" value={f.note||''} onChange={e=>up({note:e.target.value})} placeholder="예: 실모 3회차"
              className="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm" />
          </Row>
          
          {tmp && (
            <div className="bg-gradient-to-br from-stone-50 to-stone-100 border border-stone-200 rounded-xl p-3">
              <div className="flex items-center gap-1.5 mb-2"><Spark className="w-3.5 h-3.5 text-stone-600" /><span className="text-xs font-bold text-stone-700">미리보기</span></div>
              <div className="text-xs space-y-1 text-stone-600">
                <div>• 오늘부터 {f.type==='lesson'?f.targetDate:config.endDate}까지 학습일 <b className="tabular-nums">{tmp.studyDays}일</b></div>
                {f.type==='lesson' ? (
                  <>
                    <div>• 남은 분량 <b className="tabular-nums">{tmp.remaining}{f.unit}</b></div>
                    <div>• 하루 <b className="tabular-nums">{f.dailyAmount||1}{f.unit}</b>씩 → 필요 학습일 <b className="tabular-nums">{tmp.lessonDaysNeeded}일</b></div>
                    {!tmp.feasible && tmp.remaining>0 && (
                      <div className="flex items-center gap-1.5 mt-1.5 text-rose-700 font-semibold"><Warn className="w-3 h-3" />학습일이 부족함! ({tmp.studyDays}일 < {tmp.lessonDaysNeeded}일)</div>
                    )}
                  </>
                ) : <div>• 총 <b className="tabular-nums">{tmp.total}{f.unit}</b> 풀게 됨</div>}
              </div>
            </div>
          )}
        </div>
        <div className="sticky bottom-0 bg-white border-t border-stone-200 px-4 py-3 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg text-sm font-bold">취소</button>
          <button onClick={()=>ok && onSave(f)} disabled={!ok}
            className="flex-[2] py-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-sm font-bold disabled:bg-stone-300 disabled:cursor-not-allowed">저장</button>
        </div>
      </div>
    </div>
  );
}

// ========== 날짜 선택 달력 ==========
function DatePicker({ startDate, endDate, holidays, selected, onToggle }) {
  const [viewMonth, setViewMonth] = useState(() => {
    const d = pd(startDate);
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  
  const monthStart = new Date(viewMonth.y, viewMonth.m, 1);
  const monthEnd = new Date(viewMonth.y, viewMonth.m + 1, 0);
  const startDOW = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  
  const prevMonth = () => {
    const prev = new Date(viewMonth.y, viewMonth.m - 1, 1);
    setViewMonth({ y: prev.getFullYear(), m: prev.getMonth() });
  };
  const nextMonth = () => {
    const next = new Date(viewMonth.y, viewMonth.m + 1, 1);
    setViewMonth({ y: next.getFullYear(), m: next.getMonth() });
  };
  
  const cells = [];
  for (let i = 0; i < startDOW; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  
  const DOW = ['일','월','화','수','목','금','토'];
  
  return (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
      <div className="flex items-center justify-between px-3 py-2 bg-stone-50 border-b border-stone-200">
        <button type="button" onClick={prevMonth} className="p-1 hover:bg-stone-200 rounded">
          <ChevronLeft className="w-4 h-4" />
        </button>
        <div className="text-sm font-bold tabular-nums">{viewMonth.y}년 {viewMonth.m + 1}월</div>
        <button type="button" onClick={nextMonth} className="p-1 hover:bg-stone-200 rounded">
          <ChevronRight className="w-4 h-4" />
        </button>
      </div>
      <div className="grid grid-cols-7 gap-0.5 p-2">
        {DOW.map((d, i) => (
          <div key={d} className={`text-center text-[10px] font-bold py-1 ${i===0?'text-rose-500':i===6?'text-sky-500':'text-stone-400'}`}>
            {d}
          </div>
        ))}
        {cells.map((day, i) => {
          if (day === null) return <div key={`empty-${i}`}></div>;
          const ds = fd(new Date(viewMonth.y, viewMonth.m, day));
          const inRange = ds >= startDate && ds <= endDate;
          const isHoliday = holidays.includes(ds);
          const isSelected = selected.includes(ds);
          const dowIdx = new Date(viewMonth.y, viewMonth.m, day).getDay();
          
          return (
            <button key={ds} type="button" 
              onClick={() => inRange && onToggle(ds)}
              disabled={!inRange}
              className={`aspect-square text-xs font-semibold rounded-md transition-colors ${
                !inRange ? 'text-stone-300 cursor-not-allowed' :
                isSelected ? 'bg-rose-500 text-white' :
                isHoliday ? 'bg-amber-50 text-amber-700 hover:bg-amber-100' :
                dowIdx === 0 ? 'text-rose-500 hover:bg-rose-50' :
                dowIdx === 6 ? 'text-sky-500 hover:bg-sky-50' :
                'text-stone-700 hover:bg-stone-100'
              }`}>
              {day}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function Row({ label, children, req }) {
  return (
    <div>
      <label className="block text-[11px] font-bold text-stone-600 mb-1 tracking-wide">{label}{req && <span className="text-rose-500 ml-0.5">*</span>}</label>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
